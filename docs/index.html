   flotación idle sin/cos. Vive DENTRO de map.on("render") (already-on por el
   triggerRepaint del custom layer) ⇒ cero rAF nuevo. Sólo escribe transform
   (compositor GPU). Se relaja a reposo durante el motion-blur y con el panel
   abierto (no competir con el feGaussianBlur full-screen / no distraer).
   --------------------------------------------------------------- */
const cur = { x: -1e4, y: -1e4 };
window.addEventListener("pointermove", e => { cur.x = e.clientX; cur.y = e.clientY; }, { passive: true });
const tiltEls = [];
function cacheTiltRects() {
  tiltEls.length = 0;
  document.querySelectorAll("[data-tilt]").forEach((el, i) => {
    el.style.transform = "";                         // mide SIN tilt aplicado (centro real)
    const r = el.getBoundingClientRect();
    tiltEls.push({ el, i, cx: r.left + r.width / 2, cy: r.top + r.height / 2,
      rx: 0, ry: 0, rz: 0, ty: 0, s: 1, dirty: false });
  });
}
window.addEventListener("resize", cacheTiltRects);
cacheTiltRects();
function updateTilt(now) {
  const amp = (blurOn || selected >= 0) ? 0 : 1;     // sin tilt durante blur / panel abierto
  for (const t of tiltEls) {
    let tRX = 0, tRY = 0, tS = 1, tTY = 0, tRZ = 0, f = 0.08;
    if (amp) {
      const dx = cur.x - t.cx, dy = cur.y - t.cy;
      const dist = Math.hypot(dx, dy);
      const p = dist < 150 ? 1 - dist / 150 : 0;     // radio 150px (interactions.md)
      tRY = (dx / 150) * 7 * p;                       // mira al cursor (máx ±7°)
      tRX = -(dy / 150) * 5 * p;                      // eje X invertido (máx ±5°)
      tS  = 1 + 0.03 * p;                             // leve realce de escala
      tTY = Math.sin(now * 0.0011 + t.i * 1.3) * 2.5 * (1 - p);   // flotación idle (seno)
      tRZ = Math.cos(now * 0.0008 + t.i) * 0.4 * (1 - p);         // flotación idle (coseno)
      f = p > 0 ? 0.12 : 0.05;                        // seguimiento 0.12 / retorno 0.05 (interactions.md)
    }
    t.rx += (tRX - t.rx) * f; t.ry += (tRY - t.ry) * f; t.s += (tS - t.s) * f;
    t.ty += (tTY - t.ty) * f; t.rz += (tRZ - t.rz) * f;
    // guard de reposo: no ensuciar el compositor cuando ya está prácticamente quieto
    if (Math.abs(t.rx) + Math.abs(t.ry) + Math.abs(t.rz) + Math.abs(t.ty) + Math.abs(t.s - 1) < 0.004) {
      if (t.dirty) { t.el.style.transform = ""; t.dirty = false; }
      continue;
    }
    t.dirty = true;
    t.el.style.transform =
      `perspective(700px) rotateX(${t.rx.toFixed(2)}deg) rotateY(${t.ry.toFixed(2)}deg) ` +
      `translateY(${t.ty.toFixed(2)}px) rotateZ(${t.rz.toFixed(2)}deg) scale(${t.s.toFixed(3)})`;
  }
}

// ---- Muelle físico para el panel de datos (masa·tensión·fricción) ----
// Sustituye la transición CSS por la integración de un resorte: aceleración
// = (−k·x − d·v)/m. Levemente subamortiguado ⇒ desaceleración natural con un
// micro-sobreimpulso "premium". Sólo corre en rAF mientras hay movimiento.
const panelEl = document.getElementById("detail-panel");
const spring = {
  value: 0, target: 0, v: 0, raf: 0, m: 1,
  k: 205,    // tensión
  d: 24,     // fricción (crítico≈2√k≈28.6 ⇒ 24 = leve rebote "premium")
};
function applyPanel(v) {
  // VARIANT RESPONSIVE (mismo muelle k/d): el eje de entrada depende del breakpoint.
  //   · móvil  ⇒ bottom-sheet que sube desde abajo (translateY 100%→0, sin scale).
  //   · tablet/desktop ⇒ entrada lateral con sutil fade & scale (comportamiento previo).
  // Se usa 'v' sin clampear en el transform para conservar el micro-sobreimpulso del muelle.
  if (BP.mobile) {
    panelEl.style.transform = `translateY(${(1 - v) * 100}%)`;
  } else {
    panelEl.style.transform = `translateX(${(1 - v) * 100}%) scale(${0.985 + 0.015 * v})`;
  }
  panelEl.style.opacity = Math.max(0, Math.min(1, v * 1.4));
  panelEl.style.pointerEvents = v > 0.02 ? "auto" : "none";
}
function springStep() {
  const dt = 1 / 60;
  const a = (-spring.k * (spring.value - spring.target) - spring.d * spring.v) / spring.m;
  spring.v += a * dt;
  spring.value += spring.v * dt;
  if (Math.abs(spring.v) < 0.0015 && Math.abs(spring.value - spring.target) < 0.0015) {
    spring.value = spring.target; spring.v = 0; applyPanel(spring.value); spring.raf = 0;
    if (spring.target === 0) panelEl.style.willChange = "auto";   // panel cerrado ⇒ libera la capa de VRAM
    return;
  }
  applyPanel(spring.value);
  spring.raf = requestAnimationFrame(springStep);
}
function openPanel()  {
  panelEl.style.willChange = "transform, opacity";                 // capa de composición transitoria
  if (reduced()) { spring.value = spring.target = 1; spring.v = 0; applyPanel(1); return; }  // a11y: salto directo
  spring.target = 1; if (!spring.raf) spring.raf = requestAnimationFrame(springStep);
}
function closePanel() {
  if (reduced()) { spring.value = spring.target = 0; spring.v = 0; applyPanel(0); panelEl.style.willChange = "auto"; return; }
  spring.target = 0; if (!spring.raf) spring.raf = requestAnimationFrame(springStep);
}
applyPanel(0);   // estado inicial coherente (panel cerrado)

/* ---------------------------------------------------------------
   4e. REVEAL ANIMADO DE MÉTRICAS (count-up + barras scaleX + cascada)
   Al expandir la tarjeta las métricas se animan: cascada de entrada (CSS puro,
   compositor), conteo 0→valor y barras que se llenan (UN solo rAF temporal
   autoterminante, easeOutCubic, número y barra sincronizados por el mismo reloj).
   CLAVE de rendimiento: el reveal se DIFIERE hasta que el flyTo termina (moveend)
   y el motion-blur se desengancha (blurOn===false) ⇒ no solapa con el
   feGaussianBlur de pantalla completa. Sólo escribe textContent (tabular-nums ⇒
   sin reflow de hermanos) y transform (compositable).
   --------------------------------------------------------------- */
const metricsEl = document.getElementById("dp-metrics");
let metricsRaf = 0, metricItems = [];
function cancelMetrics() {
  if (metricsRaf) { cancelAnimationFrame(metricsRaf); metricsRaf = 0; }
  metricItems.forEach(it => { if (it.bar) it.bar.style.willChange = "auto"; });
  metricItems = [];
}
/* Iconografía mínima (SVG line, currentColor) — textura "OS", sin recargar la tarjeta. */
const _ic = (p) => `<svg class="bc-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${p}</svg>`;
const ICON = {
  clock: _ic('<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>'),
  alert: _ic('<path d="M12 3 2 20h20L12 3Z"/><path d="M12 10v4"/><path d="M12 17h.01"/>'),
  pin:   _ic('<path d="M12 21s-6-5.3-6-10a6 6 0 1 1 12 0c0 4.7-6 10-6 10Z"/><circle cx="12" cy="11" r="2"/>'),
  house: _ic('<path d="M4 11 12 4l8 7"/><path d="M6 10v9h12v-9"/>'),
  layers:_ic('<path d="m12 3 9 5-9 5-9-5 9-5Z"/><path d="m3 13 9 5 9-5"/>'),
  hash:  _ic('<path d="M5 9h14M5 15h14M10 4 8 20M16 4l-2 16"/>'),
};
const factsEl = document.getElementById("dp-facts");
// "Gravedad": nivel derivado de forma transparente de las víctimas visibles en la misma tarjeta.
function severity(inc) {
  if (inc.sinSignos > 0)  return ["CRÍTICA",  "var(--c-sinsignos)"];
  if (inc.heridos    > 0) return ["ALTA",     "var(--c-heridos)"];
  if (inc.rescatados > 0) return ["MEDIA",    "var(--c-rescatados)"];
  if (inc.afectados  > 0) return ["MODERADA", "var(--c-afectados)"];
  return ["BAJA", "var(--c-expuestos)"];
}
function setupFacts(inc) {
  const [sevTxt, sevC] = severity(inc);
  const facts = [
    { l: "T. RESPUESTA", v: inc.tresp,   ic: ICON.clock },
    { l: "GRAVEDAD",     v: sevTxt, mc: sevC, accent: true, ic: ICON.alert },
    { l: "COORDENADAS",  v: `${(+inc.lat).toFixed(5)}°, ${(+inc.lon).toFixed(5)}°`, mono: true, span2: true, ic: ICON.pin },
    { l: "ESTACIÓN",     v: inc.estacion, ic: ICON.house },
    { l: "ESTRATO",      v: inc.estrato,  ic: ICON.layers },
    { l: "SERVICIO Nº",  v: inc.num, mono: true, span2: true, ic: ICON.hash },
  ];
  factsEl.innerHTML = facts.map((f, i) => {
    const cls = "bento-card fact" + (f.span2 ? " span2" : "");
    const vcls = "bc-value" + (f.mono ? " mono" : "") + (f.accent ? " accent" : "");
    return `<div class="${cls}" style="--i:${i}${f.mc ? `;--mc:${f.mc}` : ""}">`
      + `<div class="bc-head"><span class="bc-label">${f.l}</span>${f.ic || ""}</div>`
      + `<span class="${vcls}">${f.v}</span></div>`;
  }).join("");
}
function setupMetrics(rows) {
  cancelMetrics();
  const maxFila = Math.max(1, ...rows.map(m => m[1]));            // normalización intra-tarjeta
  metricsEl.innerHTML = rows.map(([n, v, cc], i) => {
    const scaleFinal = v > 0 ? Math.max(0.06, v / maxFila) : 0;   // piso 0.06: un 1 entre 12 sigue visible
    return `<div class="bento-card metric${v > 0 ? "" : " metric-zero"}" style="--i:${i};--mc:${cc}" data-target="${v}" data-scale="${scaleFinal.toFixed(3)}">`
      + `<div class="bc-head"><span class="bc-dot" style="background:${cc}"></span><span class="bc-label">${n}</span></div>`
      + `<span class="bc-value count">0</span>`
      + `<div class="dp-bar"><i class="dp-bar-fill" style="background:${cc}"></i></div></div>`;
  }).join("");
  metricItems = Array.from(metricsEl.querySelectorAll(".metric")).map(row => ({
    row, node: row.querySelector(".count"), bar: row.querySelector(".dp-bar-fill"),
    target: +row.dataset.target, scaleFinal: +row.dataset.scale, t0: 0, dur: 0,
  }));
  metricItems.forEach(it => { it.node.textContent = "0"; it.bar.style.transform = "scaleX(0)"; });
}
/* Reveal de la Intel Card: cascada (stagger) de micro-tarjetas con muelle de baja
   fricción. Motion compila el spring a una easing linear() para WAAPI ⇒ corre en el
   COMPOSITOR, sin un 2º rAF que dispute el hilo con el mapa ni con el motion-blur.
   El stagger reparte la promoción de capas (no promueve 11 capas a la vez tras la
   escena WebGL); Motion gestiona y libera el will-change por elemento. */
function revealBento() {
  const cards = Array.from(panelEl.querySelectorAll(".bento-card"));
  if (!M || reduced()) {                                          // a11y / sin Motion: commit instantáneo
    cards.forEach(c => { c.style.opacity = "1"; c.style.transform = "none"; });
    startCounts(0);
    return;
  }
  cards.forEach(c => { c.style.opacity = "0"; });                 // estado inicial sin flash (mismo tick, sin paint)
  const anim = M.animate(cards,
    { opacity: [0, 1], y: [10, 0], scale: [0.94, 1] },
    { delay: M.stagger(0.045, { startDelay: 0.12 }), type: "spring", stiffness: 340, damping: 20 });
  anim?.finished?.then(() => cards.forEach(c => { c.style.opacity = "1"; c.style.willChange = "auto"; })).catch(() => {});
  startCounts(220);                                               // el conteo arranca tras el primer "pop"
}
function startCounts(delayMs) {
  const kick = () => {
    const t = performance.now();
    metricItems.forEach((it, i) => {
      it.t0 = t + i * 55 + 60;                                    // el número aterriza tras su tarjeta y luego cuenta
      it.dur = Math.min(900, Math.max(420, 420 + it.target * 22)); // números mayores cuentan algo más
      if (it.bar) it.bar.style.willChange = "transform";
      if (it.target <= 2) {                                       // n bajos: salto directo (0→2 parpadea feo)
        it.node.textContent = it.target;
        it.bar.style.transform = `scaleX(${it.scaleFinal})`;
      }
    });
    if (!metricsRaf) metricsRaf = requestAnimationFrame(stepMetrics);
  };
  if (delayMs > 0) setTimeout(kick, delayMs); else kick();
}
function stepMetrics(now) {
  let done = true;
  for (const it of metricItems) {
    if (it.target <= 2) continue;                                // ya en su valor final
    const k = Math.min(1, Math.max(0, (now - it.t0) / it.dur));
    const e = 1 - Math.pow(1 - k, 3);                            // easeOutCubic
    it.node.textContent = Math.round(it.target * e);             // ≤5 textContent/frame
    it.bar.style.transform = `scaleX(${(it.scaleFinal * e).toFixed(3)})`;
    if (k < 1) done = false;
  }
  if (!done) metricsRaf = requestAnimationFrame(stepMetrics);
  else { metricsRaf = 0; metricItems.forEach(it => { if (it.bar) it.bar.style.willChange = "auto"; }); }
}

/* ---------------------------------------------------------------
   4c. INERCIA DE PANEO EXPLÍCITA (momentum scroll 3D)
   La inercia nativa de dragPan no daba glide fiable aquí, así que la integramos
   nosotros sobre la MISMA cámara de MapLibre (no un control de Three). Durante el
   arrastre muestreamos la trayectoria del CENTRO que produce el dragPan nativo;
   al soltar la continuamos por frame con setCenter y decaimiento exponencial.
   · A prueba de signos: continúa el movimiento real del centro (no reinterpreta
     direcciones de cursor ni convenciones de panBy).
   · Independiente del zoom: umbrales y tope relativos al ancho del viewport.
   · Alimenta el motion-blur gratis: cada setCenter mueve el centro ⇒ el handler
     de render lee la velocidad y la curva no lineal decide el desenfoque.
   --------------------------------------------------------------- */
{
  const F = 0.92;        // fricción por frame (↑ = glide más largo)
  const SMOOTH = 0.55;   // suavizado exponencial de la velocidad de arrastre
  const START_PX = 2;    // px/frame al soltar por debajo de los cuales NO hay glide
  const MAX_PX = 50;     // tope de velocidad de soltado (px/frame): evita flings desbocados
  const STOP_PX = 0.3;   // px/frame por debajo de los cuales el glide se detiene
  const SAMPLE_MS = 90;  // pausa antes de soltar ⇒ sin impulso (inercia "real")

  let active = false, prevC = null, prevT = 0, lastMoveT = 0;
  let dLng = 0, dLat = 0, raf = 0;
  const cancel = () => { if (raf) { cancelAnimationFrame(raf); raf = 0; } };

  map.on("dragstart", () => {
    cancel(); active = true; dLng = dLat = 0;
    prevC = map.getCenter(); prevT = lastMoveT = performance.now();
  });
  map.on("drag", () => {
    if (!active || !prevC) return;
    const c = map.getCenter(), now = performance.now();
    const k = 16.7 / Math.max(1, now - prevT);          // normaliza a Δ por frame (~60fps)
    dLng = dLng * (1 - SMOOTH) + (c.lng - prevC.lng) * k * SMOOTH;
    dLat = dLat * (1 - SMOOTH) + (c.lat - prevC.lat) * k * SMOOTH;
    prevC = c; prevT = lastMoveT = now;
  });
  map.on("dragend", () => {
    if (!active) return;
    active = false;
    if (performance.now() - lastMoveT > SAMPLE_MS) return;   // se detuvo antes de soltar
    if (Math.hypot(dLng, dLat) < 1e-9) return;
    // velocidad de soltado convertida a PÍXELES/frame (correcta a cualquier zoom/pitch):
    // proyecta el centro y el centro+Δ y mide su separación en pantalla.
    const c = map.getCenter();
    const p0 = map.project(c);
    const p1 = map.project([c.lng + dLng, c.lat + dLat]);
    let px = Math.hypot(p1.x - p0.x, p1.y - p0.y);
    if (px < START_PX) return;                                // arrastre lento ⇒ sin glide
    if (px > MAX_PX) { const s = MAX_PX / px; dLng *= s; dLat *= s; px = MAX_PX; }
    const stopDeg = Math.hypot(dLng, dLat) * (STOP_PX / px);  // umbral de parada (en grados, ∝ px)
    map.stop();                                               // anula cualquier ease residual
    const step = () => {
      const cc = map.getCenter();
      map.setCenter([cc.lng + dLng, cc.lat + dLat]);          // continúa la trayectoria del centro
      dLng *= F; dLat *= F;
      if (Math.hypot(dLng, dLat) > stopDeg) raf = requestAnimationFrame(step);
      else raf = 0;
    };
    raf = requestAnimationFrame(step);
  });
  // Re-agarre, clic de selección o zoom de rueda ⇒ cortar el glide en curso
  const cont = map.getCanvasContainer();
  cont.addEventListener("pointerdown", cancel);
  cont.addEventListener("wheel", cancel, { passive: true });
}

/* ---------------------------------------------------------------
   5. ARRANQUE
   --------------------------------------------------------------- */
Promise.all([loadData(), new Promise(r => map.on("load", r))]).then(([data]) => {
  incidents = data;

  // Heatmap macro (Fase 1): puntos de calor abstractos, carmesí sobre B/N
  map.addSource("pts", {
    type: "geojson",
    data: {
      type: "FeatureCollection",
      features: incidents.map(d => ({
        type: "Feature",
        geometry: { type: "Point", coordinates: [d.lon, d.lat] },
        properties: { day: d.day },
      })),
    },
  });
  map.addLayer({
    id: "heat", type: "heatmap", source: "pts",
    paint: {
      "heatmap-radius": ["interpolate", ["linear"], ["zoom"], 9, 4, 14, 18],
      "heatmap-intensity": ["interpolate", ["linear"], ["zoom"], 9, 0.06, 14, 0.3],
      "heatmap-weight": 0.5,
      "heatmap-color": ["interpolate", ["linear"], ["heatmap-density"],
        0, "rgba(0,0,0,0)",
        0.25, "rgba(80,8,20,0.45)",
        0.55, "rgba(179,18,46,0.75)",
        0.85, "rgba(255,106,0,0.85)",
        1, "rgba(255,224,0,0.95)"],
      // El heatmap se desvanece al entrar en rango 3D
      "heatmap-opacity": ["interpolate", ["linear"], ["zoom"], 13, 0.85, CONFIG.reveal3DZoom, 0],
    },
  });

  layer3D = buildLayer3D();
  map.addLayer(layer3D);
  applyDay();

  document.getElementById("legend").classList.add("visible");
  const loader = document.getElementById("loader");
  loader.style.opacity = "0";
  setTimeout(runEntrance, 120);            // coreografía de entrada (Motion/WAAPI) mientras el loader se disipa
  setTimeout(() => loader.remove(), 800);
  setTimeout(showCoach, 1150);             // onboarding: dirige la atención al Play tras asentarse la entrada
});
</script>
