<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UAECOB · Análisis Espacio-Temporal de Incidentes 3D</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<style>
  /* ============ SISTEMA DE DISEÑO GLOBAL ============
     Mapa base: monocromático B/N. Colores de alerta reservados
     exclusivamente para datos WebGL y acentos de UI de datos. */
  :root {
    /* Texto en paleta Material "Nocturnal Intel" */
    --ink: #e5e2e1;
    --ink-dim: #9e8f78;
    /* Glassmorphism: superficie translúcida + borde sutil (≈ .glass-panel del ref.) */
    --bg-panel: rgba(19, 19, 19, 0.40);
    --line: rgba(255, 255, 255, 0.10);
    /* Acentos de CHROME (ámbar/verde Material). El DATO conserva sus colores de alerta. */
    --primary: #ffdca1;
    --primary-container: #ffb800;
    --accent: #ffba20;
    --secondary-container: #00fe66;
    --glow: rgba(255, 186, 32, 0.12);
    /* Colores de DATO — NO tocar: los leen la leyenda y las barras de métrica */
    --c-sinsignos: #b3122e;
    --c-heridos: #ff6a00;
    --c-rescatados: #00ffb3;
    --c-afectados: #ffe000;
    --c-expuestos: #2979ff;
    --font: "Inter", "Segoe UI", system-ui, sans-serif;
    --mono: "JetBrains Mono", "Consolas", monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #000; overflow: hidden; font-family: var(--font); }
  #map { position: absolute; inset: 0; }

  /* ---- Top App Bar (glass pill estilo Nocturnal Intel) ---- */
  header {
    position: absolute; top: 16px; left: 16px; right: 16px; z-index: 10;
    height: 56px; padding: 0 24px; pointer-events: none;
    display: flex; justify-content: space-between; align-items: center;
    background: var(--bg-panel); border: 1px solid var(--line);
    backdrop-filter: blur(20px) saturate(140%); -webkit-backdrop-filter: blur(20px) saturate(140%);
    border-radius: 14px; box-shadow: 0 0 18px var(--glow);
  }
  header h1 {
    color: var(--primary); font-size: 14px; font-weight: 700;
    letter-spacing: 0.24em; text-transform: uppercase;
  }
  header h1 span { color: var(--ink-dim); font-weight: 400; letter-spacing: 0.16em; }
  #phase-indicator {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em;
    color: var(--secondary-container); text-transform: uppercase; text-align: right;
  }
  /* Punto de estado pulsante (pseudo-elemento ⇒ sobrevive a setPhase/textContent) */
  #phase-indicator::before {
    content: ""; width: 7px; height: 7px; border-radius: 50%; flex: none;
    background: var(--secondary-container); box-shadow: 0 0 8px var(--secondary-container);
    animation: pulse-dot 2.4s cubic-bezier(0.4,0,0.6,1) infinite;
  }

  /* ---- Timeline (único control visible en Fase 1) ---- */
  #timeline {
    position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
    z-index: 10; width: min(680px, 86vw);
    background: var(--bg-panel); border: 1px solid var(--line);
    backdrop-filter: blur(20px) saturate(140%); -webkit-backdrop-filter: blur(20px) saturate(140%);
    border-radius: 16px; padding: 14px 22px 12px; box-shadow: 0 0 18px var(--glow);
    transition: opacity 0.4s ease;
  }
  #timeline .row { display: flex; align-items: center; gap: 14px; }
  #timeline label {
    font-family: var(--mono); font-size: 10px; color: var(--ink-dim);
    letter-spacing: 0.15em; text-transform: uppercase; white-space: nowrap;
  }
  #date-readout {
    font-family: var(--mono); font-size: 12px; color: var(--ink);
    min-width: 150px; text-align: right;
  }
  #play-btn {
    background: rgba(255,186,32,0.08); border: 1px solid var(--line); color: var(--primary);
    width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
    font-size: 10px; line-height: 1; transition: border-color 0.2s, transform 0.2s, background 0.2s;
  }
  #play-btn:hover { border-color: var(--accent); background: rgba(255,186,32,0.16); }  /* scale → Motion (único dueño del transform) */

  /* ---- Toggle VISTA GLOBAL (override de la ventana de 40 días) ---- */
  #showall-btn {
    display: inline-flex; align-items: center; gap: 7px; flex: none;
    height: 30px; padding: 0 12px; border-radius: 999px; cursor: pointer;
    background: rgba(255,255,255,0.04); border: 1px solid var(--line);
    color: var(--ink-dim); font-family: var(--mono); font-size: 9px;
    letter-spacing: 0.16em; text-transform: uppercase; white-space: nowrap;
    transition: color .2s, border-color .2s, background .2s, box-shadow .2s;
  }
  #showall-btn .sa-ic { width: 14px; height: 14px; flex: none; }
  #showall-btn:hover { color: var(--ink); border-color: var(--accent); background: rgba(255,186,32,0.10); }
  #showall-btn[aria-pressed="true"] {                  /* estado ON: realce ámbar minimalista (sin relleno pleno) */
    color: var(--accent); border-color: var(--accent);
    background: rgba(255,186,32,0.14);
    box-shadow: 0 0 14px var(--glow), inset 0 0 12px rgba(255,186,32,0.10);
  }
  #showall-btn:focus-visible { outline: 2px solid var(--ink); outline-offset: 3px; }

  /* ---- Onboarding del Play: tooltip flotante + anillo pulsante ---- */
  #play-coach {
    position: absolute; left: 8px; bottom: calc(100% + 10px); z-index: 12;
    pointer-events: none; opacity: 0;                  /* Motion lo revela; reduced-motion lo fija a 1 */
    background: var(--bg-panel); border: 1px solid var(--line);
    backdrop-filter: blur(20px) saturate(140%); -webkit-backdrop-filter: blur(20px) saturate(140%);
    border-radius: 10px; padding: 7px 11px; box-shadow: 0 0 18px var(--glow);
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--primary); white-space: nowrap;
  }
  #play-coach::after {                                 /* pico apuntando al botón Play */
    content: ""; position: absolute; top: 100%; left: 18px;
    border: 5px solid transparent; border-top-color: var(--bg-panel);
  }
  @keyframes coachRing {
    0%   { box-shadow: 0 0 0 0 rgba(255,186,32,0.45); }
    70%  { box-shadow: 0 0 0 11px rgba(255,186,32,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,186,32,0); }
  }
  #play-btn.coach { animation: coachRing 1.8s ease-out infinite; }   /* box-shadow ≠ transform ⇒ no choca con tactile() */

  /* Móvil: el toggle se reduce a sólo-ícono (como el label del timeline) */
  @media (max-width: 640px) {
    #showall-btn { padding: 0 9px; }
    #showall-btn .sa-tx { display: none; }
  }
  input[type="range"] {
    flex: 1; -webkit-appearance: none; appearance: none; height: 2px;
    background: linear-gradient(90deg, var(--accent) var(--fill, 100%), rgba(255,255,255,0.15) var(--fill, 100%));
    border-radius: 2px; outline: none; cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent); border: none;
    box-shadow: 0 0 0 4px rgba(255,186,32,0.18), 0 0 10px var(--accent);
    transition: box-shadow 0.2s;
  }
  input[type="range"]::-webkit-slider-thumb:hover { box-shadow: 0 0 0 7px rgba(255,186,32,0.25), 0 0 12px var(--accent); }

  /* ---- Tooltip de hover (lente de contexto) ---- */
  #tooltip {
    position: absolute; z-index: 20; pointer-events: none;
    background: var(--bg-panel); border: 1px solid var(--line);
    backdrop-filter: blur(20px) saturate(140%); -webkit-backdrop-filter: blur(20px) saturate(140%);
    border-radius: 10px; padding: 10px 14px; max-width: 260px;
    opacity: 0; transform: translateY(6px); transition: opacity 0.18s ease, transform 0.18s ease;
    font-size: 11px; color: var(--ink); line-height: 1.5;
  }
  #tooltip.visible { opacity: 1; transform: translateY(0); }
  #tooltip .tt-title { font-weight: 600; font-size: 11px; letter-spacing: 0.06em; }
  #tooltip .tt-sub { color: var(--ink-dim); font-family: var(--mono); font-size: 9.5px; }

  /* ---- Panel lateral (Fase 3: micro-análisis) ---- */
  #detail-panel {
    position: absolute; top: 0; right: 0; bottom: 0; z-index: 15;
    width: min(380px, 92vw);
    background: var(--bg-panel); border-left: 3px solid var(--accent);
    backdrop-filter: blur(20px) saturate(140%); -webkit-backdrop-filter: blur(20px) saturate(140%);
    box-shadow: -8px 0 30px rgba(0,0,0,0.45);
    padding: 80px 30px 30px; color: var(--ink); overflow-y: auto;
    /* El montaje/desmontaje lo gobierna un muelle físico en JS (translateX/scale),
       no una transición temporal: por eso aquí NO hay transition de transform. */
    transform: translateX(100%); opacity: 0; pointer-events: none;
    /* will-change lo activa/desactiva el JS (openPanel / reposo del muelle): evita
       mantener una capa de composición de 380px viva en VRAM con el panel cerrado. */
  }
  #detail-panel h2 { font-size: 16px; font-weight: 700; letter-spacing: 0.02em; margin-bottom: 4px; color: var(--primary); }
  #detail-panel .dp-date { font-family: var(--mono); font-size: 10px; color: var(--ink-dim); letter-spacing: 0.12em; margin-bottom: 24px; text-transform: uppercase; }
  .dp-section { margin-bottom: 22px; }
  .dp-label { font-family: var(--mono); font-size: 9px; color: var(--ink-dim); letter-spacing: 0.22em; text-transform: uppercase; margin-bottom: 6px; }
  .dp-value { font-size: 12.5px; line-height: 1.55; }
  /* ============ BENTO DE MICRO-TARJETAS (Intel Card) ============
     Cada valor vive en su propia micro-tarjeta. El reveal (stagger + spring) lo
     posee Motion (WAAPI ⇒ compositor, sin un 2º rAF que dispute el hilo con el mapa).
     Se animan SOLO opacity/transform; el HOVER no usa transform ⇒ cero layout shift,
     un único dueño del transform por nodo. `contain: layout` aísla el count-up. */
  .bento { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; contain: layout; }
  .bento-card {
    position: relative; display: flex; flex-direction: column; gap: 5px;
    padding: 11px 12px 12px; border-radius: 12px;
    background: rgba(255, 255, 255, 0.025);
    border: 1px solid rgba(255, 255, 255, 0.08);
    --mc: var(--accent);                                   /* acento por tarjeta (override inline) */
    transition: border-color .22s ease, background .22s ease, box-shadow .22s ease;
    backface-visibility: hidden;                           /* la cara que anima Motion se mantiene nítida */
  }
  .bento-card.span2 { grid-column: 1 / -1; }
  .bento-card:hover {                                      /* feedback sin transform (estable) */
    border-color: color-mix(in srgb, var(--mc) 50%, transparent);
    background: rgba(255, 255, 255, 0.05);
    box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--mc) 16%, transparent),
                0 0 14px color-mix(in srgb, var(--mc) 12%, transparent);
  }
  .bc-head { display: flex; align-items: center; gap: 7px; min-height: 13px; }
  .bc-label { font-family: var(--mono); font-size: 8.5px; font-weight: 500;
    letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-dim); }
  .bc-dot { width: 7px; height: 7px; border-radius: 50%; flex: none; box-shadow: 0 0 6px var(--mc); }
  .bc-ic { width: 13px; height: 13px; margin-left: auto; flex: none; color: var(--mc); opacity: 0.42; }
  .bc-value { font-family: var(--mono); font-size: 17px; font-weight: 600; line-height: 1.12;
    color: var(--ink); font-variant-numeric: tabular-nums; letter-spacing: 0.01em; }
  .bc-value.mono { font-size: 12.5px; font-weight: 500; letter-spacing: 0.04em; word-break: break-word; }
  .bc-value.accent { color: var(--mc); }
  /* Métrica: número algo mayor; el color vive en el punto + barra (limpio, no recargado) */
  .bento-card.metric .bc-value { font-size: 18px; }
  .bento-card.metric-zero .bc-dot { opacity: 0.2; box-shadow: none; }
  .bento-card.metric-zero .bc-label, .bento-card.metric-zero .bc-value { opacity: 0.4; }
  /* Barra: pista + relleno escalado con scaleX (compositor, NO width) */
  .dp-bar { position: relative; height: 2px; margin-top: 3px; border-radius: 1px;
    overflow: hidden; background: rgba(255, 255, 255, 0.07); }
  .dp-bar-fill { display: block; height: 100%; width: 100%; transform: scaleX(0); transform-origin: left center; }
  #close-panel {
    position: absolute; top: 26px; right: 26px; background: none;
    border: 1px solid var(--line); color: var(--ink); width: 30px; height: 30px;
    border-radius: 50%; cursor: pointer; font-size: 13px;
    transition: border-color 0.2s, transform 0.2s;
  }
  #close-panel:hover { border-color: var(--accent); color: var(--accent); }  /* rotate → Motion (único dueño del transform) */

  /* ---- Leyenda ---- */
  #legend {
    position: absolute; left: 16px; bottom: 28px; z-index: 9;
    font-family: var(--mono); font-size: 9.5px; color: var(--ink-dim);
    letter-spacing: 0.1em; line-height: 1.9; opacity: 0; transition: opacity 0.6s;
    background: var(--bg-panel); border: 1px solid var(--line);
    backdrop-filter: blur(20px) saturate(140%); -webkit-backdrop-filter: blur(20px) saturate(140%);
    border-radius: 12px; padding: 12px 16px;
    pointer-events: none;   /* decorativo: nunca intercepta el mapa (su "hover 3D" llega por proximidad/JS) */
  }
  #legend.visible { opacity: 1; }
  #legend .li { display: flex; align-items: center; gap: 8px; }
  #legend .sw { width: 9px; height: 9px; border-radius: 2px; }

  #loader {
    position: absolute; inset: 0; z-index: 50; background: #000;
    display: flex; flex-direction: column; gap: 14px;
    align-items: center; justify-content: center; color: var(--ink-dim);
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.3em;
    transition: opacity 0.7s; text-transform: uppercase;
  }
  #loader .bar { width: 180px; height: 1px; background: rgba(255,255,255,0.12); overflow: hidden; }
  #loader .bar i { display: block; height: 100%; width: 30%; background: var(--accent); box-shadow: 0 0 10px var(--accent); animation: scan 1.1s infinite linear; }
  @keyframes scan { from { transform: translateX(-100%);} to { transform: translateX(600%);} }

  /* ---- Animaciones / decoración Nocturnal Intel ---- */
  @keyframes pulse-dot { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.8); } }
  .scan-line {
    position: absolute; left: 0; right: 0; top: 0; height: 2px; z-index: 2; pointer-events: none;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.22; animation: scanline 9s linear infinite;
  }
  @keyframes scanline { from { top: 0; } to { top: 100%; } }

  /* ---- Decorativos con tilt 3D por proximidad (el transform lo escribe el JS) ---- */
  [data-tilt] { will-change: transform; transform-style: preserve-3d; backface-visibility: hidden; }

  /* Fallback sin backdrop-filter (p.ej. Firefox con la flag desactivada): sube la
     opacidad de la superficie para conservar el contraste AA del texto. */
  @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
    :root { --bg-panel: rgba(10, 10, 12, 0.92); }
  }

  /* Foco visible por teclado (no afecta al ratón) */
  #play-btn:focus-visible, #close-panel:focus-visible,
  input[type="range"]:focus-visible { outline: 2px solid var(--ink); outline-offset: 3px; }

  /* =========================================================================
     RESPONSIVE — móvil / tablet / desktop / desktop+
     SOLO geometría (posición, tamaño, layout). CERO cambios a tokens, paleta,
     glassmorphism o backdrop-filter (Regla 1: preservación estética absoluta).
     ========================================================================= */

  /* ---- MÓVIL (≤640px) ---- */
  @media (max-width: 640px) {
    /* Header: el título largo y el indicador de fase desbordaban a este ancho */
    header { top: 10px; left: 10px; right: 10px; height: 50px; padding: 0 14px; }
    header h1 { font-size: 12px; letter-spacing: 0.12em; }
    header h1 span { display: none; }
    #phase-indicator { font-size: 8.5px; letter-spacing: 0.10em; gap: 6px; }

    /* Leyenda: del borde inferior-izq (colisiona con el timeline centrado) a una
       tira horizontal bajo el header ⇒ sin solape, conservando la clave de color */
    #legend {
      top: 70px; left: 8px; right: 8px; bottom: auto;
      display: flex; flex-direction: row; flex-wrap: wrap; gap: 6px 14px;
      justify-content: center; padding: 8px 12px; line-height: 1.2; font-size: 9px;
    }

    /* Timeline: barra inferior a todo el ancho (sin centrado por transform) */
    #timeline { left: 10px; right: 10px; bottom: 12px; width: auto; transform: none;
      padding: 10px 14px 9px; border-radius: 14px; }
    #timeline label { display: none; }            /* libera ancho para el slider */
    #date-readout { min-width: 0; font-size: 10px; }

    /* Detail panel ⇒ BOTTOM SHEET (el eje translateY lo aplica applyPanel en JS).
       max-height: 82vh ⇒ la franja superior del mapa sigue visible y paneable. */
    #detail-panel {
      top: auto; left: 0; right: 0; bottom: 0;
      width: 100%; max-height: 82vh;
      border-left: none; border-top: 3px solid var(--accent);
      border-radius: 18px 18px 0 0;
      box-shadow: 0 -12px 34px rgba(0, 0, 0, 0.5);
      padding: 30px 20px max(22px, env(safe-area-inset-bottom, 22px));
    }
    /* Asa de arrastre (afordancia de sheet) — usa el token --line, sin color nuevo */
    #detail-panel::before {
      content: ""; position: absolute; top: 9px; left: 50%; transform: translateX(-50%);
      width: 42px; height: 4px; border-radius: 2px; background: var(--line);
    }
    #close-panel { top: 14px; right: 16px; }
  }

  /* ---- TABLET (641–1024px) ---- */
  @media (min-width: 641px) and (max-width: 1024px) {
    #detail-panel { width: min(400px, 64vw); }
    #timeline { width: min(680px, 80vw); }
  }

  /* ---- DESKTOP+ (≥1600px): respira algo más en pantallas grandes ---- */
  @media (min-width: 1600px) {
    #timeline { width: min(820px, 64vw); }
    #detail-panel { width: 420px; padding: 88px 36px 36px; }
  }

  /* ---- Punteros gruesos (táctil): blancos de toque más grandes ---- */
  @media (pointer: coarse) {
    input[type="range"] { height: 4px; }
    input[type="range"]::-webkit-slider-thumb { width: 20px; height: 20px; }
    #play-btn { width: 36px; height: 36px; }
  }

  /* ---- prefers-reduced-motion: detiene las animaciones decorativas infinitas
     (las micro-interacciones Motion ya se neutralizan en JS) ---- */
  @media (prefers-reduced-motion: reduce) {
    .scan-line, #phase-indicator::before, #loader .bar i, #play-btn.coach { animation: none !important; }
  }

</style>
</head>
<body>
<div id="map"></div>
<div class="scan-line" aria-hidden="true"></div>

<!-- Filtro de MOTION BLUR (anisótropo, dirigido por la velocidad de cámara).
     stdDeviation se reescribe por frame desde JS; el filtro sólo se engancha al
     canvas durante el movimiento (en reposo: filter:none ⇒ coste cero). -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <filter id="mblur" x="-15%" y="-15%" width="130%" height="130%" color-interpolation-filters="sRGB">
    <feGaussianBlur id="mblur-gauss" in="SourceGraphic" stdDeviation="0 0" edgeMode="duplicate"/>
  </filter>
</svg>

<header>
  <h1 data-tilt>UAECOB <span>/ INCIDENTES 2020 · BOGOTÁ D.C.</span></h1>
  <div id="phase-indicator" data-tilt>FASE 1 · VISTA MACRO</div>
</header>

<div id="timeline">
  <div id="play-coach" aria-hidden="true">INICIAR SECUENCIA</div>
  <div class="row">
    <button id="play-btn" title="Reproducir línea de tiempo">▶</button>
    <label>Timeline</label>
    <input type="range" id="time-slider" min="0" max="1215" value="0" step="1" />
    <div id="date-readout">—</div>
    <button id="showall-btn" type="button" aria-pressed="false" title="Mostrar todos los incidentes (anula la ventana de 40 días)">
      <svg class="sa-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3c2.6 2.4 4 5.5 4 9s-1.4 6.6-4 9c-2.6-2.4-4-5.5-4-9s1.4-6.6 4-9Z"/></svg>
      <span class="sa-tx">VISTA GLOBAL</span>
    </button>
  </div>
</div>

<div id="tooltip"></div>

<div id="legend" data-tilt>
  <div class="li"><span class="sw" style="background:var(--c-sinsignos)"></span>SIN SIGNOS</div>
  <div class="li"><span class="sw" style="background:var(--c-heridos)"></span>HERIDOS</div>
  <div class="li"><span class="sw" style="background:var(--c-rescatados)"></span>RESCATADOS</div>
  <div class="li"><span class="sw" style="background:var(--c-afectados)"></span>AFECTADOS</div>
  <div class="li"><span class="sw" style="background:var(--c-expuestos)"></span>EXPUESTOS</div>
</div>

<div id="detail-panel">
  <button id="close-panel">✕</button>
  <h2 id="dp-title">—</h2>
  <div class="dp-date" id="dp-date">—</div>
  <div class="dp-section"><div class="dp-label">Ubicación</div><div class="dp-value" id="dp-loc">—</div></div>
  <div class="dp-section"><div class="dp-label">Servicio / Causa</div><div class="dp-value" id="dp-serv">—</div></div>
  <div class="dp-section"><div class="dp-label">Parámetros de respuesta</div><div id="dp-facts" class="bento"></div></div>
  <div class="dp-section"><div class="dp-label">Categorías de afectación</div><div id="dp-metrics" class="bento"></div></div>
</div>

<div id="loader"><div>Procesando 20K registros</div><div class="bar"><i></i></div></div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<!-- Motion (vanilla / WAAPI) — vendorizado localmente desde motion@12.40.0
     (node_modules/motion/dist/motion.js -> docs/vendor/motion.js). Se carga como
     etiqueta script clasica (UMD) => window.Motion, igual que maplibregl y THREE:
     sin bundler, sin import-map y SIN dependencia CDN nueva en runtime (version fijada). -->
<script src="vendor/motion.js"></script>
<script>
/* =====================================================================
   MAPA INTERACTIVO 3D — INCIDENTES UAECOB
   Arquitectura: MapLibre GL (basemap monocromático + heatmap macro)
   + CustomLayer Three.js (InstancedMesh: geometría, halos, partículas).
   Draw calls del layer 3D: 3 instanced (formas) + 1 instanced (halos)
   + 1 Points (partículas selección) + 1 mesh (glow EXPUESTOS) ≤ 6.
   ===================================================================== */

const CONFIG = {
  center: [-74.085, 4.62],
  epoch: Date.UTC(2020, 0, 1),            // día 0 del dataset
  totalDays: 243,                          // 1-ene → 31-ago 2020
  decayK: 0.025,                           // decaimiento temporal del edificio: max(0.85, exp(-k·Δdías))
  lensRadiusPx: 160,                       // radio de la lente de contexto (px pantalla)
  reveal3DZoom: 14.5,                      // zoom a partir del cual el 3D es permanente
  baseHeight: 55,                          // altura base de extrusión (m)
  lifespanDays: 40,                        // ciclo de vida: cada incidente se renderiza solo en dt ∈ [0, 40] días
  timeScale: 5,                            // subdivisiones del slider por día: timeline más largo
                                           // ⇒ los incidentes se despliegan con más separación
};

const COLORS = {
  SIN_SIGNOS: new THREE.Color(0xb3122e),
  HERIDOS:    new THREE.Color(0xff6a00),
  RESCATADOS: new THREE.Color(0x00ffb3),
  AFECTADOS:  new THREE.Color(0xffe000),
  EXPUESTOS:  new THREE.Color(0x2979ff),
  NEUTRO:     new THREE.Color(0xd8d8d8),
};

const MESES = { enero:0, febrero:1, marzo:2, abril:3, mayo:4, junio:5, julio:6, agosto:7, septiembre:8, octubre:9, noviembre:10, diciembre:11 };

/* ---------------------------------------------------------------
   1. INGESTA Y NORMALIZACIÓN DE DATOS
   Las coordenadas del CSV usan punto como separador de millar:
   "458.675.670.000.008" ≡ 4.58675670000008. Reconstrucción:
   se eliminan los puntos y se inserta el decimal tras el primer
   dígito (latitud ~4.x) o tras los dos primeros (longitud ~74.x).
   --------------------------------------------------------------- */
function parseLat(raw) {
  const d = raw.replace(/[^0-9]/g, "");
  if (d.length < 3) return NaN;
  return parseFloat(d[0] + "." + d.slice(1));
}
function parseLon(raw) {
  const d = raw.replace(/[^0-9]/g, "");
  if (d.length < 4) return NaN;
  return -parseFloat(d.slice(0, 2) + "." + d.slice(2));
}
function parseFecha(raw) {
  // formato: "miércoles 1 de enero de 2020"
  const m = raw.toLowerCase().match(/(\d{1,2}) de ([a-záéíóúñ]+) de (\d{4})/);
  if (!m) return null;
  const mes = MESES[m[2]];
  if (mes === undefined) return null;
  return new Date(Date.UTC(+m[3], mes, +m[1]));
}
function sumCols(cols, idxs) {
  let s = 0;
  for (const i of idxs) { const v = parseInt(cols[i], 10); if (!isNaN(v)) s += v; }
  return s;
}
// Forma según naturaleza del servicio: fuego → pirámide (0),
// rescate → esfera (1), resto → cilindro (2).
function shapeFor(servicio, clase) {
  const s = (servicio + " " + clase).toUpperCase();
  if (/INCENDIO|QUEMA|FUEGO|EXPLOS|FUGA/.test(s)) return 0;
  if (/RESCATE/.test(s)) return 1;
  return 2;
}

async function loadData() {
  const res = await fetch("incidentes.csv");
  const buf = await res.arrayBuffer();
  // El CSV de datos abiertos viene en latin-1 / windows-1252
  let text;
  try { text = new TextDecoder("windows-1252").decode(buf); }
  catch { text = new TextDecoder("utf-8").decode(buf); }
  const lines = text.split(/\r?\n/);
  const H = lines[0].split(";").map(h => h.trim().toUpperCase());
  const col = name => H.findIndex(h => h.includes(name));
  const I = {
    fecha: col("FECHA"), num: col("MERO SERVICIO"), estacion: col("ESTACI"),
    lat: col("LATITUD"), lon: col("LONGITUD"), barrio: col("BARRIO"),
    estrato: col("ESTRATO"), upz: col("UPZ"), localidad: col("LOCALIDAD"),
    hora: col("HORA"), tresp: col("TIEMPO"),
    servicio: H.findIndex(h => h === "SERVICIO"),
    clase: col("CLASE DE SERVICIO"), causa: col("CAUSAS"),
  };
  const range = (start) => [start, start + 1, start + 2, start + 3];
  const iExp = H.findIndex(h => h.includes("EXPUESTOS"));
  const iAfe = H.findIndex(h => h.includes("AFECTADOS"));
  const iRes = H.findIndex(h => h.includes("RESCATADOS"));
  const iHer = H.findIndex(h => h.includes("HERIDOS"));
  const iSin = H.findIndex(h => h.includes("SIN SIGNOS"));

  const incidents = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i]) continue;
    const c = lines[i].split(";");
    if (c.length < 20) continue;
    const lat = parseLat(c[I.lat] || ""), lon = parseLon(c[I.lon] || "");
    // Filtro al bounding box de Bogotá D.C.; descarta coordenadas corruptas
    if (isNaN(lat) || isNaN(lon) || lat < 3.7 || lat > 4.95 || lon < -74.5 || lon > -73.8) continue;
    const date = parseFecha(c[I.fecha] || "");
    if (!date) continue;
    const day = Math.round((date.getTime() - CONFIG.epoch) / 86400000);
    if (day < 0 || day > CONFIG.totalDays) continue;
    const estrato = Math.min(6, Math.max(1, parseInt(c[I.estrato], 10) || 3));
    incidents.push({
      lat, lon, day, estrato,
      barrio: c[I.barrio] || "—", upz: c[I.upz] || "—", localidad: c[I.localidad] || "—",
      estacion: c[I.estacion] || "—", num: c[I.num] || "—",
      hora: c[I.hora] || "—", tresp: c[I.tresp] || "—",
      servicio: c[I.servicio] || "—", clase: c[I.clase] || "—", causa: c[I.causa] || "—",
      fechaTxt: c[I.fecha] || "—",
      shape: shapeFor(c[I.servicio] || "", c[I.clase] || ""),
      expuestos: sumCols(c, range(iExp)),
      afectados: sumCols(c, range(iAfe)),
      rescatados: sumCols(c, range(iRes)),
      heridos: sumCols(c, range(iHer)),
      sinSignos: sumCols(c, range(iSin)),
    });
  }
  return incidents;
}

// Color dominante: prioridad por gravedad descendente
function dominantColor(inc) {
  if (inc.sinSignos > 0) return COLORS.SIN_SIGNOS;
  if (inc.heridos > 0) return COLORS.HERIDOS;
  if (inc.rescatados > 0) return COLORS.RESCATADOS;
  if (inc.afectados > 0) return COLORS.AFECTADOS;
  if (inc.expuestos > 0) return COLORS.EXPUESTOS;
  return COLORS.NEUTRO;
}

/* ---------------------------------------------------------------
   2. MAPA BASE MONOCROMÁTICO + HEATMAP MACRO (FASE 1)
   --------------------------------------------------------------- */
const map = new maplibregl.Map({
  container: "map",
  style: "https://basemaps.cartocdn.com/gl/dark-matter-nolabels-gl-style/style.json",
  center: CONFIG.center,
  zoom: 10.6,
  pitch: 0,
  antialias: true,
  maxPitch: 70,
  // Inercia de cámara: la cámara es la de MapLibre (NO un OrbitControls de Three;
  // la cámara 3D se esclaviza a esta matriz por frame en render()). La inercia
  // NATIVA de dragPan no producía un glide fiable en este visor (custom layer +
  // triggerRepaint continuo), así que la ANULAMOS aquí (maxSpeed:0 ⇒ sin inercia
  // nativa, el arrastre directo se conserva) y la reimplementamos explícitamente
  // más abajo (sección 4c) con un integrador de momento sobre esta misma cámara.
  dragPan: { maxSpeed: 0 },
});
// Zoom de rueda más orgánico (paso por incremento menor ⇒ desaceleración fina)
map.scrollZoom.setZoomRate(1 / 130);

/* ---------------------------------------------------------------
   3. CAPA 3D (Three.js custom layer)
   Posiciones en coordenadas Mercator relativas a un origen común;
   un solo modelMatrix las lleva al espacio de la cámara de MapLibre.
   --------------------------------------------------------------- */
let incidents = [];
let layer3D = null;
let selected = -1;

const ORIGIN = maplibregl.MercatorCoordinate.fromLngLat(CONFIG.center, 0);
const METER = ORIGIN.meterInMercatorCoordinateUnits();

function mercLocal(lon, lat) {
  const m = maplibregl.MercatorCoordinate.fromLngLat([lon, lat], 0);
  return [(m.x - ORIGIN.x) / METER, (m.y - ORIGIN.y) / METER];
}

// ---- Shaders de EDIFICIOS (cajas con ventanas emisivas) ----
// Migrados de la escena cinemática y adaptados al custom layer de MapLibre:
// como aquí no hay luces ni postproceso, el material de ventanas se reimplementa
// en un ShaderMaterial propio que sí respeta la línea de tiempo (uDay), la lente
// de contexto (uLens) y el revelado por zoom/selección (uReveal).
//   iDim  = ancho·alto·profundidad (m) de cada edificio (∝ severidad)
//   iBurn = 0..1 intensidad de incendio (víctimas) ⇒ ventanas altas en llamas
const VERT_BUILDING = `
  attribute vec3 iOffset;      // base del edificio en coords locales (m)
  attribute vec3 iColor;       // color de la categoría dominante
  attribute float iDay;        // día del incidente desde epoch
  attribute vec3 iDim;         // ancho, alto, profundidad (m)
  attribute float iSeed;
  attribute float iBurn;       // 0..1 intensidad de incendio
  uniform float uTime;
  uniform float uDay;
  uniform vec3 uLens;
  uniform float uReveal;
  uniform float u_showAll;     // VISTA GLOBAL: 0 = ventana de 40 d; 1 = dataset completo (lerp en render())
  varying vec3 vColor;
  varying float vAlpha;
  varying vec3 vObj;
  varying vec3 vNrm;
  varying float vSeed;
  varying float vBurn;
  varying float vH;
  void main() {
    vColor = iColor; vSeed = iSeed; vBurn = iBurn; vNrm = normal; vH = iDim.y;
    // CICLO DE VIDA en GPU: el incidente solo se renderiza mientras dt ∈ (0, LIFESPAN) días.
    //   alive = 1 sólo en esa ventana — APARECE tras su día (frontera estricta abajo ⇒
    //   lienzo limpio en el día 0) y DESAPARECE al CUMPLIR 40 días (frontera estricta arriba).
    // OCULTACIÓN ÓPTIMA (discard vs. colapso): para los NO-vivos no rasterizamos y luego
    // descartamos; COLAPSAMOS la geometría en el vértice (position·alive): si alive=0, los
    // 8 vértices caen en iOffset ⇒ triángulos de área 0 (degenerados) ⇒ el ensamblador de
    // primitivas los descarta ANTES de rasterizar ⇒ CERO fragmentos para obsoletos/futuros
    // (la mayoría del dataset en cualquier uDay). Branchless, sin divergencia de warp.
    // HONESTIDAD sobre early-Z: este pase lo mantiene DESACTIVADO por el discard del
    // fragment, que NO es por el ciclo de vida (ya colapsado) sino por la LENTE de contexto
    // en vista macro (edificio vivo fuera de la lente ⇒ vAlpha→0 ⇒ descartado). El colapso
    // no restaura el early-Z; su ganancia es evitar la rasterización/fragmentos de los no-vivos.
    float dt = uDay - iDay;
    float windowed = (1.0 - step(dt, 0.0)) * (1.0 - step(${CONFIG.lifespanDays.toFixed(1)}, dt));  // ventana rodante dt ∈ (0, 40)
    float alive = max(windowed, u_showAll);  // VISTA GLOBAL: u_showAll→1 revela todo el histórico (la geometría crece desde 0 ⇒ los fragmentos rampan suave, sin pico)
    vec3 p = position * iDim * alive;   // volumen w×h×d (o un punto degenerado si no vive)
    vObj = p;
    vec3 world = p + iOffset;
    // Decaimiento temporal: alpha = exp(-k·Δdías); suelo alto (0.85) ⇒ edificios sólidos,
    // no fantasmales, conservando un leve gradiente de antigüedad
    float decay = max(0.85, exp(-${CONFIG.decayK.toFixed(4)} * dt));
    // Lente de contexto: borde suave de 25% del radio
    float dLens = distance(world.xz, uLens.xy);
    float lens = 1.0 - smoothstep(uLens.z * 0.75, uLens.z, dLens);
    // alive ya colapsó los no-vivos; en los vivos, la LENTE sigue gobernando el discard
    // del fragment (edificio vivo fuera de la lente en macro ⇒ vAlpha→0 ⇒ descartado).
    vAlpha = alive * decay * max(lens, uReveal);
    gl_Position = projectionMatrix * modelViewMatrix * vec4(world, 1.0);
  }
`;
const FRAG_BUILDING = `
  precision highp float;
  uniform float uTime;
  varying vec3 vColor;
  varying float vAlpha;
  varying vec3 vObj;
  varying vec3 vNrm;
  varying float vSeed;
  varying float vBurn;
  varying float vH;
  float bhash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7)) + vSeed * 57.0) * 43758.5453); }
  void main() {
    if (vAlpha < 0.01) discard;
    // Cuerpo: hormigón oscuro, levemente tintado por la categoría
    vec3 col = vec3(0.045, 0.05, 0.06) + vColor * 0.05;
    if (vNrm.y > 0.5) col += vColor * 0.05 + 0.015;      // cubierta algo más clara
    // Ventanas: rejilla 4.4×3.4 m sobre caras laterales (normal horizontal)
    if (abs(vNrm.y) < 0.5) {
      vec2 wc = abs(vNrm.x) > 0.5 ? vObj.zy : vObj.xy;
      vec2 cell = floor(wc / vec2(4.4, 3.4));
      vec2 f = fract(wc / vec2(4.4, 3.4));
      float win = step(0.30, f.x) * step(f.x, 0.68) * step(0.34, f.y) * step(f.y, 0.74);
      // Ventanas vivas: cada celda titila y algunas se encienden/apagan en el tiempo,
      // con ritmo y fase propios (por edificio y por ventana) ⇒ toda la ciudad animada.
      float hc = bhash(cell);
      float litBase = step(0.80, hc);                                     // ~20% siempre encendidas
      float band = step(0.58, hc) * (1.0 - step(0.80, hc));               // franja intermedia que titila
      float cycle = step(0.0, sin(uTime * (0.5 + hc * 1.5) + hc * 50.0)); // encendido/apagado lento
      float lit = max(litBase, band * cycle);
      float twinkle = 0.65 + 0.35 * sin(uTime * (2.5 + hc * 4.0) + hc * 25.0); // parpadeo de brillo
      col += win * lit * vec3(1.0, 0.78, 0.45) * 0.6 * twinkle;           // luz cálida interior animada
      // Edificio en llamas (víctimas): plantas altas parpadean con el color de datos
      if (vBurn > 0.01) {
        float fl = 0.5 + 0.5 * sin(uTime * 9.0 + bhash(cell) * 40.0);
        float upper = smoothstep(0.2, 0.9, vObj.y / max(vH, 1.0));
        col += win * step(0.5, bhash(cell + 7.0)) * vColor * fl * upper * vBurn * 1.3;
      }
    }
    // Edificios 100% sólidos: el alpha (vAlpha) solo decide el descarte (futuro / fuera
    // de lente); el fragmento visible se emite totalmente opaco, sin translucidez.
    gl_FragColor = vec4(col, 1.0);
  }
`;

// ---- Base de incidente · "Cybernetic Premium OS" ----
// Reticle limpio (anillo fino) que sustituye al antiguo blob de estrato. Sobre TODA
// instancia ya aparecida corre una ANIMACIÓN DUAL simultánea:
//   · SIRENA  → barrido angular que orbita rápido (rotativo), confinado al borde.
//   · PULSO   → respiración senoidal lenta (radio + opacidad) + anillo que viaja.
// Datos: iRadius (m) ∝ heridos/afectados; iSev (0..1) gravedad → color en GPU.
// Optimización vs. la ruta sugerida (setMatrixAt / iColor vec3):
//   - Esta capa NO usa InstancedMesh: la escala es 1 float (iRadius) en el VS, no
//     una mat4 de 16 floats por instancia (16× menos buffer, sin multiplicar matriz).
//   - El color va como 1 float (iSev) y la rampa verde→ámbar→carmesí se evalúa en el
//     VÉRTICE (4 invocaciones/instancia) y viaja como varying plano — no por fragmento
//     (miles de invocaciones). Net: −2 floats/instancia y la rampa corre ~10³× menos.
const VERT_HALO = `
  attribute vec3 iOffset;       // base del incidente en coords locales (m)
  attribute float iDay;         // día del incidente (cull de futuro vs. timeline)
  attribute float iSev;         // 0..1 gravedad ponderada → color
  attribute float iRadius;      // radio base en metros (∝ heridos/afectados)
  attribute float iSeed;        // desfase de fase por instancia (sirena/pulso)
  uniform float uTime;
  uniform float uDay;
  uniform vec3 uLens;
  uniform float uReveal;
  uniform float u_showAll;     // VISTA GLOBAL (idéntico al edificio)
  varying vec2 vUv;
  varying vec3 vColor;
  varying float vAlpha;
  varying float vSeed;
  varying float vSev;
  // Rampa de gravedad evaluada UNA vez por vértice: verde (bajo) → ámbar (medio)
  // → carmesí (alto). Dos tramos mix+smoothstep ⇒ punto medio ámbar controlado y
  // sin banding (más suave y barato que el step() por fragmento de la ruta base).
  vec3 gravityRamp(float s) {
    vec3 lo  = vec3(0.18, 0.95, 0.42);   // verde   — menor impacto
    vec3 mid = vec3(1.00, 0.62, 0.07);   // ámbar   — impacto medio
    vec3 hi  = vec3(0.86, 0.07, 0.18);   // carmesí — alta criticidad
    vec3 c = mix(lo, mid, smoothstep(0.0, 0.5, s));
    return mix(c, hi, smoothstep(0.5, 1.0, s));
  }
  void main() {
    vUv = uv * 2.0 - 1.0;
    vSeed = iSeed; vSev = iSev;
    vColor = gravityRamp(iSev);
    // PULSO ELEGANTE (1/2): respiración senoidal lenta del radio (escala sutil).
    float breathe = 0.5 + 0.5 * sin(uTime * 1.6 + iSeed * 6.2831);
    // CICLO DE VIDA en GPU (idéntico al edificio): visible solo en dt ∈ (0, LIFESPAN).
    // alive=0 ⇒ radio 0 ⇒ los 4 vértices del quad caen en iOffset ⇒ quad degenerado
    // ⇒ culled antes de rasterizar (cero fragmentos de barrido/pulso para obsoletos).
    float dt = uDay - iDay;
    float windowed = (1.0 - step(dt, 0.0)) * (1.0 - step(${CONFIG.lifespanDays.toFixed(1)}, dt));  // ventana rodante dt ∈ (0, 40)
    float alive = max(windowed, u_showAll);  // VISTA GLOBAL: revela todo el histórico
    float radius = iRadius * (0.94 + 0.10 * breathe) * alive;
    vec3 p = position * radius;                 // disco de 'radius' m (o punto degenerado si no vive)
    vec3 world = p + iOffset; world.y = 0.6;
    float dLens = distance(world.xz, uLens.xy);
    float lens = 1.0 - smoothstep(uLens.z * 0.75, uLens.z, dLens);
    // El pulso elegante modula también la opacidad base.
    vAlpha = alive * max(lens, uReveal) * (0.55 + 0.45 * breathe);
    gl_Position = projectionMatrix * modelViewMatrix * vec4(world, 1.0);
  }
`;
const FRAG_HALO = `
  precision highp float;
  uniform float uTime;
  varying vec2 vUv;
  varying vec3 vColor;
  varying float vAlpha;
  varying float vSeed;
  varying float vSev;
  void main() {
    float r = length(vUv);
    if (r > 1.0 || vAlpha < 0.01) discard;
    // 1) Anillo perimetral nítido (reticle premium): línea fina, no blob.
    float ring = smoothstep(0.07, 0.0, abs(r - 0.82));
    // 2) Relleno interior tenue (glow suave, no saturado).
    float fill = (1.0 - smoothstep(0.0, 0.82, r)) * 0.08;
    // 3) PULSO: anillo concéntrico que viaja hacia afuera y se desvanece.
    float pr = fract(uTime * 0.45 + vSeed);
    float pulse = smoothstep(0.06, 0.0, abs(r - pr * 0.82)) * (1.0 - pr) * 0.7;
    // 4) SIRENA: barrido angular que orbita rápido (rotativo), confinado al borde.
    //    La frecuencia sube con la gravedad ⇒ los críticos "giran" con más urgencia.
    float ang = atan(vUv.y, vUv.x);
    float spin = 6.0 + vSev * 6.0;
    float sweep = pow(0.5 + 0.5 * sin(ang - uTime * spin + vSeed * 6.2831), 6.0);
    sweep *= smoothstep(0.45, 0.82, r);
    // Alfa = (anillo + relleno + pulso) modulado por el pulso elegante (vAlpha), +
    // el barrido de sirena. El barrido además sobre-ilumina el color (acento scanner).
    float a = (ring + fill + pulse + sweep * 0.9) * vAlpha;
    vec3 col = vColor * (1.0 + sweep * 0.7);
    gl_FragColor = vec4(col, a);
  }
`;

// ---- Fuego + humo del incidente seleccionado (migrado de la escena cinemática) ----
// Por partícula: aSite = centro de la cubierta, aSpan = w×d de la huella,
// aColor = categoría dominante, aRand = aleatorios, aSev = severidad normalizada.
// El emisor cubre el rectángulo del techo ⇒ el fuego se adapta a la forma del edificio.
const FIRE_VS = `
  attribute vec3 aSite; attribute vec2 aSpan; attribute vec3 aColor;
  attribute vec3 aRand; attribute float aSev;
  uniform float uTime;
  varying vec3 vColor; varying float vT; varying float vSeed;
  void main() {
    vColor = aColor; vSeed = aRand.x;
    float t = fract(uTime * (0.55 + aRand.z * 0.5) + aRand.x);   // ciclo de vida
    vT = t;
    // rejilla aleatoria dentro de w×d que converge al centro al subir
    vec2 spread = (vec2(aRand.x, aRand.y) - 0.5) * aSpan * (1.0 - t * 0.55);
    float rise = t * (16.0 + aSev * 46.0);                       // llama más alta y voraz
    vec3 p = aSite + vec3(spread.x, rise, spread.y);
    p.x += sin(uTime * 3.0 + aRand.y * 20.0 + t * 7.0) * (1.0 + t * 2.5);
    p.z += cos(uTime * 2.4 + aRand.x * 17.0 + t * 6.0) * (1.0 + t * 2.0);
    vec4 mv = modelViewMatrix * vec4(p, 1.0);
    float s = (1.0 - t) * (1.0 - t) * (13.0 + aSev * 40.0) + 2.5; // llamas más grandes
    gl_PointSize = min(s * 360.0 / -mv.z, 120.0);                // tope de px mayor
    gl_Position = projectionMatrix * mv;
  }
`;
const FIRE_FS = `
  precision highp float;
  uniform float uTime;
  varying vec3 vColor; varying float vT; varying float vSeed;
  float h2(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }
  void main() {
    vec2 q = gl_PointCoord * 2.0 - 1.0;
    float r = length(q);
    if (r > 1.0) discard;
    // máscara de llama: núcleo blando + rotura por ruido animado
    float n = h2(floor(q * 5.0 + vec2(0.0, uTime * 14.0) + vSeed * 60.0));
    float mask = smoothstep(1.0, 0.15, r + n * 0.45);
    // rampa térmica: núcleo blanco-cálido → color de datos → extinción
    vec3 core = vec3(1.0, 0.95, 0.75);
    vec3 col = mix(core, vColor, smoothstep(0.0, 0.18, vT));
    col = mix(col, vColor * 0.2, smoothstep(0.55, 1.0, vT));
    float a = mask * (1.0 - vT);                                 // más opaco y luminoso
    gl_FragColor = vec4(col * 2.0, a);                           // emisión potenciada (incendio voraz)
  }
`;
const SMOKE_FS = `
  precision highp float;
  varying vec3 vColor; varying float vT; varying float vSeed;
  void main() {
    vec2 q = gl_PointCoord * 2.0 - 1.0;
    float r = length(q);
    if (r > 1.0) discard;
    float a = smoothstep(1.0, 0.2, r) * sin(vT * 3.1416) * 0.42; // humo más denso y amenazante
    gl_FragColor = vec4(mix(vec3(0.06,0.06,0.07), vColor * 0.16, 0.3), a);
  }
`;
// El humo reutiliza el VS del fuego, con columna más alta y grano más ancho
const SMOKE_VS = FIRE_VS
  .replace("float rise = t * (16.0 + aSev * 46.0);", "float rise = 12.0 + aSev * 30.0 + t * (60.0 + aSev * 90.0);")
  .replace("float s = (1.0 - t) * (1.0 - t) * (13.0 + aSev * 40.0) + 2.5;", "float s = (10.0 + t * 42.0) * (0.5 + aSev * 0.7);");

// ---- Glow EXPUESTOS: disco aditivo, grosor ∝ conteo ----
const FRAG_GLOW = `
  precision highp float;
  uniform float uThick;   // grosor normalizado del contorno ∝ expuestos
  varying vec2 vUv;
  void main() {
    float r = length(vUv * 2.0 - 1.0);
    if (r > 1.0) discard;
    // campo estático: banda de contorno [1−uThick, 1] + relleno tenue
    float edge = smoothstep(1.0 - uThick, 1.0 - uThick * 0.4, r) * (1.0 - smoothstep(0.92, 1.0, r));
    float fill = (1.0 - r) * 0.12;
    gl_FragColor = vec4(0.16, 0.47, 1.0, (edge * 0.8 + fill));
  }
`;

function buildLayer3D() {
  const camera = new THREE.Camera();
  const scene = new THREE.Scene();
  let renderer = null;
  const clock = new THREE.Clock();
  let lastT = 0;                          // último timestamp (dt para la rampa de VISTA GLOBAL en render())

  const uniforms = {
    uTime: { value: 0 },
    uDay: { value: 0 },                 // arranca en el día 0 (lienzo limpio); applyDay() lo gobierna
    uLens: { value: new THREE.Vector3(1e9, 1e9, 0) },
    uReveal: { value: 0 },
    u_showAll: { value: 0 },            // VISTA GLOBAL: valor animado que leen los shaders (0↔1)
    u_showAllTarget: { value: 0 },      // destino 0/1; render() interpola u_showAll → target (sin rAF extra)
  };

  // Edificios instanciados (un solo draw call): caja unidad con base en y=0.
  // Las dimensiones y el nº de ventanas/fuego derivan de la severidad del incidente,
  // con la misma fórmula ponderada que usaba la escena cinemática.
  {
    const n = incidents.length;
    const geo = new THREE.InstancedBufferGeometry().copy(
      new THREE.BoxGeometry(1, 1, 1).translate(0, 0.5, 0));
    geo.instanceCount = n;
    const off = new Float32Array(n * 3), col = new Float32Array(n * 3);
    const day = new Float32Array(n), dim = new Float32Array(n * 3);
    const seed = new Float32Array(n), burn = new Float32Array(n);
    incidents.forEach((inc, i) => {
      const [x, z] = mercLocal(inc.lon, inc.lat);
      off.set([x, 0, z], i * 3);
      const c = dominantColor(inc);
      col.set([c.r, c.g, c.b], i * 3);
      day[i] = inc.day;
      // Severidad ponderada (prioriza pérdidas humanas) → volumen y altura del edificio
      const sev = inc.sinSignos * 5 + inc.heridos * 3 + inc.rescatados * 2 + inc.afectados + inc.expuestos;
      const sevN = Math.min(1, sev / 12);
      const r1 = (i % 997) / 997, r2 = ((i * 7) % 991) / 991;   // jitter determinista
      const S = 1.5;                                             // escala global: mayor presencia
      const w = (8 + sevN * 13 + r1 * 4) * S;                    // huella
      const d = (8 + sevN * 13 + r2 * 4) * S;
      const h = (11 + sevN * 46) * (0.7 + 0.6 * r1) * S;         // altura ∝ severidad + variación
      dim.set([w, h, d], i * 3);
      seed[i] = r1;
      // intensidad de incendio: los edificios con víctimas arden en sus ventanas altas
      burn[i] = Math.min(1, (inc.sinSignos * 1.0 + inc.heridos * 0.6 + inc.rescatados * 0.3) / 3);
      inc._w = w; inc._h = h; inc._d = d; inc._sevN = sevN; inc._x = x; inc._z = z;
    });
    geo.setAttribute("iOffset", new THREE.InstancedBufferAttribute(off, 3));
    geo.setAttribute("iColor", new THREE.InstancedBufferAttribute(col, 3));
    geo.setAttribute("iDay", new THREE.InstancedBufferAttribute(day, 1));
    geo.setAttribute("iDim", new THREE.InstancedBufferAttribute(dim, 3));
    geo.setAttribute("iSeed", new THREE.InstancedBufferAttribute(seed, 1));
    geo.setAttribute("iBurn", new THREE.InstancedBufferAttribute(burn, 1));
    const mat = new THREE.ShaderMaterial({
      vertexShader: VERT_BUILDING, fragmentShader: FRAG_BUILDING,
      uniforms, transparent: false, depthWrite: true, side: THREE.FrontSide,
    });
    const buildings = new THREE.Mesh(geo, mat);
    buildings.frustumCulled = false;
    scene.add(buildings);
  }

  // Bases de incidente (un solo draw call instanciado) — reticle "Cybernetic
  // Premium OS" con animación dual (sirena + pulso). Buffer por instancia: 7 floats
  // (iOffset3 + iDay1 + iSev1 + iRadius1 + iSeed1) = 28 B ⇒ ~560 KB para 20K
  // (vs. 720 KB con el iColor vec3 anterior). El cuello de botella real es el
  // fill-rate de los quads aditivos, que la lente/zoom ya acotan — no el buffer.
  {
    const n = incidents.length;
    const geo = new THREE.InstancedBufferGeometry().copy(
      new THREE.PlaneGeometry(2, 2).rotateX(-Math.PI / 2));
    geo.instanceCount = n;
    const off = new Float32Array(n * 3);
    const day = new Float32Array(n), sev = new Float32Array(n);
    const rad = new Float32Array(n), seed = new Float32Array(n);
    incidents.forEach((inc, i) => {
      const [x, z] = mercLocal(inc.lon, inc.lat);
      off.set([x, 0, z], i * 3);
      day[i] = inc.day;
      // GRAVEDAD (0..1) → color: misma severidad ponderada que la altura del edificio
      // (prioriza pérdidas humanas) ⇒ codificación coherente entre volumen y base.
      const g = inc.sinSignos * 5 + inc.heridos * 3 + inc.rescatados * 2 + inc.afectados + inc.expuestos;
      sev[i] = Math.min(1, g / 12);
      // RADIO (m) ∝ heridos/afectados (heridos pesan más). Piso de 34 m ⇒ TODO
      // incidente tiene base visible (refuerza el "se aplica a todas las instancias").
      const vict = inc.heridos * 1.0 + inc.afectados * 0.5;
      rad[i] = 34 + 120 * Math.min(1, vict / 8);
      seed[i] = (i % 1000) / 1000;   // desfase de fase del barrido/pulso
    });
    geo.setAttribute("iOffset", new THREE.InstancedBufferAttribute(off, 3));
    geo.setAttribute("iDay", new THREE.InstancedBufferAttribute(day, 1));
    geo.setAttribute("iSev", new THREE.InstancedBufferAttribute(sev, 1));
    geo.setAttribute("iRadius", new THREE.InstancedBufferAttribute(rad, 1));
    geo.setAttribute("iSeed", new THREE.InstancedBufferAttribute(seed, 1));
    const mat = new THREE.ShaderMaterial({
      vertexShader: VERT_HALO, fragmentShader: FRAG_HALO,
      uniforms, transparent: true, depthWrite: false,
      blending: THREE.AdditiveBlending, side: THREE.DoubleSide,
    });
    const halo = new THREE.Mesh(geo, mat);
    halo.frustumCulled = false;
    scene.add(halo);
  }

  // FX de selección: el edificio del incidente "arde" (fuego + humo) como en la
  // escena cinemática. Emisores sobre la cubierta (w×d), volumen ∝ severidad, y se
  // conserva el glow aditivo de EXPUESTOS. Se reconstruye por incidente seleccionado.
  let fireFX = null, smokeFX = null, glowMesh = null;
  const fxUniforms = { uTime: uniforms.uTime };

  function clearSelectionFX() {
    [fireFX, smokeFX].forEach(o => { if (o) { scene.remove(o); o.geometry.dispose(); o.material.dispose(); } });
    fireFX = smokeFX = null;
    if (glowMesh) { scene.remove(glowMesh); glowMesh.geometry.dispose(); glowMesh.material.dispose(); glowMesh = null; }
  }

  function spawnSelectionFX(inc) {
    clearSelectionFX();
    const [x, z] = mercLocal(inc.lon, inc.lat);
    const h = inc._h || CONFIG.baseHeight, w = inc._w || 14, d = inc._d || 14;
    const sevN = Math.max(0.25, inc._sevN || 0.2);
    const c = dominantColor(inc);
    const total = Math.floor(160 + sevN * 520);          // birth rate potenciado ∝ severidad
    const site = new Float32Array(total * 3), span = new Float32Array(total * 2);
    const col = new Float32Array(total * 3), rnd = new Float32Array(total * 3);
    const sev = new Float32Array(total);
    for (let k = 0; k < total; k++) {
      site.set([x, h, z], k * 3);                         // emisor sobre la cubierta
      span.set([w * 0.8, d * 0.8], k * 2);
      col.set([c.r, c.g, c.b], k * 3);
      rnd.set([Math.random(), Math.random(), Math.random()], k * 3);
      sev[k] = sevN;
    }
    const mk = (vs, fs, blend) => {
      const g = new THREE.BufferGeometry();
      g.setAttribute("position", new THREE.BufferAttribute(new Float32Array(total * 3), 3));
      g.setAttribute("aSite", new THREE.BufferAttribute(site, 3));
      g.setAttribute("aSpan", new THREE.BufferAttribute(span, 2));
      g.setAttribute("aColor", new THREE.BufferAttribute(col, 3));
      g.setAttribute("aRand", new THREE.BufferAttribute(rnd, 3));
      g.setAttribute("aSev", new THREE.BufferAttribute(sev, 1));
      const m = new THREE.ShaderMaterial({
        vertexShader: vs, fragmentShader: fs, uniforms: fxUniforms,
        transparent: true, depthWrite: false, blending: blend,
      });
      const pts = new THREE.Points(g, m);
      pts.frustumCulled = false;
      return pts;
    };
    smokeFX = mk(SMOKE_VS, SMOKE_FS, THREE.NormalBlending);
    fireFX = mk(FIRE_VS, FIRE_FS, THREE.AdditiveBlending);
    scene.add(smokeFX); scene.add(fireFX);
    if (inc.expuestos > 0) {
      // Grosor del contorno ∝ expuestos, acotado [0.08, 0.5]
      const thick = Math.min(0.5, 0.08 + inc.expuestos * 0.05);
      const g = new THREE.PlaneGeometry(160, 160).rotateX(-Math.PI / 2);
      const m = new THREE.ShaderMaterial({
        vertexShader: `varying vec2 vUv; void main(){ vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
        fragmentShader: FRAG_GLOW,
        uniforms: { uThick: { value: thick } },
        transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
        side: THREE.DoubleSide,
      });
      glowMesh = new THREE.Mesh(g, m);
      glowMesh.position.set(x, 1.0, z);
      scene.add(glowMesh);
    }
  }

  // ---- Picking 3D: raycast contra el volumen (AABB) de cada edificio ----
  // Selecciona el edificio bajo el cursor aunque se clique en su cuerpo o cima
  // (no solo en la base), respetando la visibilidad actual: día del timeline y
  // revelado por zoom/selección o presencia dentro de la lente de contexto.
  const _ray = new THREE.Ray();
  const _box = new THREE.Box3();
  const _hit = new THREE.Vector3();
  const _invProj = new THREE.Matrix4();
  function pick(ndcX, ndcY) {
    _invProj.copy(camera.projectionMatrix).invert();
    const near = new THREE.Vector3(ndcX, ndcY, -1).applyMatrix4(_invProj);
    const far  = new THREE.Vector3(ndcX, ndcY,  1).applyMatrix4(_invProj);
    _ray.origin.copy(near);
    _ray.direction.copy(far.sub(near)).normalize();
    const uDay = uniforms.uDay.value;
    const lx = uniforms.uLens.value.x, lz = uniforms.uLens.value.y, lr = uniforms.uLens.value.z;
    const revealed = uniforms.uReveal.value >= 0.5;
    let best = -1, bestT = Infinity;
    const showingAll = uniforms.u_showAllTarget.value > 0.5;   // VISTA GLOBAL ⇒ todo lo renderizado es seleccionable
    for (let i = 0; i < incidents.length; i++) {
      const inc = incidents[i];
      if (!showingAll) {
        if (inc.day >= uDay) continue;                        // aún no aparecido (dt≤0) ⇒ no seleccionable
        if (uDay - inc.day >= CONFIG.lifespanDays) continue;  // obsoleto (≥40 d) ⇒ ya no se renderiza
      }
      if (!revealed) {                                      // en macro solo lo visible bajo la lente
        const dx = inc._x - lx, dz = inc._z - lz;
        if (dx * dx + dz * dz > lr * lr) continue;
      }
      const hw = inc._w * 0.5, hd = inc._d * 0.5;
      _box.min.set(inc._x - hw, 0, inc._z - hd);
      _box.max.set(inc._x + hw, inc._h, inc._z + hd);
      if (_ray.intersectBox(_box, _hit)) {
        const t = _hit.distanceToSquared(_ray.origin);      // hit más cercano a la cámara
        if (t < bestT) { bestT = t; best = i; }
      }
    }
    return best;
  }

  return {
    id: "incidents-3d",
    type: "custom",
    renderingMode: "3d",
    uniforms, spawnSelectionFX, clearSelectionFX, pick,
    onAdd(mapInst, gl) {
      renderer = new THREE.WebGLRenderer({ canvas: mapInst.getCanvas(), context: gl, antialias: true });
      renderer.autoClear = false;
    },
    render(gl, matrix) {
      const tNow = clock.getElapsedTime();
      const dt = Math.min(0.05, tNow - lastT); lastT = tNow;   // dt acotado (re-foco de pestaña)
      uniforms.uTime.value = tNow;
      // Rampa suave de VISTA GLOBAL dentro del loop YA existente (cero rAF nuevo):
      // exp-smoothing dt-based de u_showAll → su target. La geometría fuera de ventana
      // crece desde 0 ⇒ la carga de fragmentos sube gradual (sin pico de un frame).
      const _sa = uniforms.u_showAll, _tgt = uniforms.u_showAllTarget.value;
      if (_sa.value !== _tgt) {
        _sa.value += (_tgt - _sa.value) * (1 - Math.exp(-dt / 0.22));
        if (Math.abs(_tgt - _sa.value) < 0.001) _sa.value = _tgt;
      }
      // matriz: proyección MapLibre → traslación/escala del origen Mercator
      const m = new THREE.Matrix4().fromArray(matrix);
      const l = new THREE.Matrix4()
        .makeTranslation(ORIGIN.x, ORIGIN.y, 0)
        .scale(new THREE.Vector3(METER, -METER, METER))
        .multiply(new THREE.Matrix4().makeRotationX(Math.PI / 2));
      camera.projectionMatrix = m.multiply(l);
      renderer.resetState();
      renderer.render(scene, camera);
      map.triggerRepaint();
    },
  };
}

/* ---------------------------------------------------------------
   4. INTERACCIÓN: LENTE (hover), SELECCIÓN (click), TIMELINE
   --------------------------------------------------------------- */
const tooltip = document.getElementById("tooltip");
const phaseEl = document.getElementById("phase-indicator");
const fmtDate = d => new Date(CONFIG.epoch + d * 86400000)
  .toLocaleDateString("es-CO", { day: "numeric", month: "long", year: "numeric", timeZone: "UTC" });

/* ---------------------------------------------------------------
   4f. CAPA DE MICRO-INTERACCIONES — Motion (vanilla) + responsive
   -----------------------------------------------------------------
   DECISIÓN DE ARQUITECTURA (documentada según la directriz crítica):
   Se usa la versión VANILLA de Motion (UMD global window.Motion), NO un nodo
   React + Framer Motion. Razones, atadas a las dos reglas inquebrantables:
     · 60 FPS del mapa — animate()/hover()/press() de Motion vanilla compilan a la
       Web Animations API (WAAPI) ⇒ corren en el hilo del COMPOSITOR, fuera del
       main-thread. NO instalan un rAF permanente nuevo (la regla dura de design.md)
       ni compiten con el render loop always-on del custom layer (≈16K instancias) ni
       con el motion-blur full-screen. Framer-Motion-React montaría un reconciliador
       y su propio scheduler rAF en el main-thread ⇒ contención directa. Se descarta.
     · Eventos MapLibre / táctil — no se monta ninguna capa React sobre el canvas.
       Los decorativos siguen con pointer-events:none; los controles capturan solo su
       caja; el bottom-sheet móvil está acotado en altura y su pointer-events lo
       gobierna el muelle ⇒ el mapa permanece paneable bajo el dedo.
   La física tuneada existente (muelle del panel, inercia, motion-blur, tilt, count-up)
   se PRESERVA intacta. Cero cambios a tokens/paleta/glass (Regla 1).
   --------------------------------------------------------------- */
const M = window.Motion || null;
const reduceMQ = window.matchMedia("(prefers-reduced-motion: reduce)");
const reduced = () => reduceMQ.matches;

// Breakpoints REACTIVOS (media queries dinámicos vía matchMedia, no solo CSS):
// applyPanel() y las variants de entrada leen BP para decidir el eje de movimiento.
const BP = { mobile: false, tablet: false, wide: false };
const mqMobile = window.matchMedia("(max-width: 640px)");
const mqTablet = window.matchMedia("(min-width: 641px) and (max-width: 1024px)");
const mqWide   = window.matchMedia("(min-width: 1600px)");
function syncBP() { BP.mobile = mqMobile.matches; BP.tablet = mqTablet.matches; BP.wide = mqWide.matches; }
syncBP();   // antes del primer applyPanel(0) ⇒ el panel arranca en el eje correcto
// Cruzar un breakpoint con el panel abierto ⇒ re-pintarlo en el eje nuevo
// (lateral⇄inferior) y recachear los centros del tilt (el layout cambió).
[mqMobile, mqTablet, mqWide].forEach(mq => mq.addEventListener("change", () => {
  syncBP();
  applyPanel(spring.value);
  cacheTiltRects();
}));

// ---- Tacto/hover de botones — un único dueño del transform (mini máquina hover/press).
// El CSS conserva color/borde en :hover; el TRANSFORM (scale/rotate) lo lleva Motion.
function tactile(el, { hoverScale = 1, hoverRotate = 0, pressScale = 0.9 } = {}) {
  if (!M || !el) return;
  const SPR = { type: "spring", stiffness: 480, damping: 24 };
  let isHover = false, isPress = false;
  const render = () => {
    if (reduced()) { M.animate(el, { scale: 1, rotate: 0 }, { duration: 0 }); return; }
    const scale  = isPress ? pressScale : (isHover ? hoverScale : 1);
    const rotate = (isHover && !isPress) ? hoverRotate : 0;
    M.animate(el, { scale, rotate }, SPR);
  };
  M.hover(el, () => { isHover = true; render(); return () => { isHover = false; render(); }; });
  M.press(el, () => { isPress = true; render(); return () => { isPress = false; render(); }; });
}
tactile(document.getElementById("play-btn"),    { hoverScale: 1.08, pressScale: 0.88 });
tactile(document.getElementById("close-panel"), { hoverScale: 1.06, hoverRotate: 90, pressScale: 0.88 });

// ---- Coreografía de entrada (WAAPI, una sola vez al arrancar) ----
// transform/opacity ⇒ compositor. <header> y #timeline NO son data-tilt (sus hijos sí):
//   · header: opacity + y (su transform está libre).
//   · #timeline: se centra con translateX(-50%) en desktop ⇒ NO se toca su transform;
//     se anima su opacidad y se desliza su contenido (.row).
//   · #legend es data-tilt (el tilt posee su transform) ⇒ su opacidad la lleva .visible
//     (CSS) y aquí solo se hace el stagger de las filas .li (que no son tilt).
// Keyframes en array [desde,hasta] ⇒ el primer valor se fija en el 1er frame (sin flash),
// y bajo prefers-reduced-motion las duraciones colapsan a 0 (commit instantáneo).
function runEntrance() {
  if (!M) return;
  const r = reduced(), E = [0.16, 1, 0.3, 1];
  M.animate("header", { opacity: [0, 1], y: [-16, 0] }, { duration: r ? 0 : 0.7, ease: E });
  M.animate("#timeline", { opacity: [0, 1] }, { duration: r ? 0 : 0.6, ease: E });
  M.animate("#timeline .row", { y: [18, 0] }, { duration: r ? 0 : 0.6, delay: r ? 0 : 0.06, ease: E });
  M.animate("#legend .li", { opacity: [0, 1], x: [-10, 0] },
    { duration: r ? 0 : 0.5, delay: r ? 0 : M.stagger(0.06, { startDelay: 0.22 }), ease: E });
  if (!r) setTimeout(cacheTiltRects, 950);   // recachear centros del tilt ya asentado el layout
}

function setPhase(txt) {
  if (txt === phaseEl.textContent) return;   // gate: mousemove llama mucho ⇒ solo en cambios reales
  phaseEl.textContent = txt;
  // Relevo sutil del texto — SOLO opacidad: el transform de #phase-indicator lo posee el tilt.
  if (M && !reduced()) M.animate(phaseEl, { opacity: [0.4, 1] }, { duration: 0.3, ease: "easeOut" });
}

// Píxel del evento (CSS px del contenedor) → coordenadas NDC [-1, 1] para el raycast
function ndc(point) {
  const cv = map.getCanvas();
  return [(point.x / cv.clientWidth) * 2 - 1, -((point.y / cv.clientHeight) * 2 - 1)];
}

map.on("mousemove", e => {
  if (!layer3D) return;
  // Lente: radio en px → metros según resolución actual del mapa
  // metros/px = 156543.03 · cos(lat) / 2^zoom  (resolución Web Mercator)
  const mpp = 156543.03392 * Math.cos(e.lngLat.lat * Math.PI / 180) / Math.pow(2, map.getZoom());
  const [x, z] = mercLocal(e.lngLat.lng, e.lngLat.lat);
  layer3D.uniforms.uLens.value.set(x, z, CONFIG.lensRadiusPx * mpp);

  // edificio bajo el cursor por raycast (la lente ya se actualizó arriba)
  const [nx, ny] = ndc(e.point);
  const i = layer3D.pick(nx, ny);
  if (i >= 0) {
    const inc = incidents[i];
    tooltip.innerHTML =
      `<div class="tt-title">${inc.servicio}</div>` +
      `<div class="tt-sub">${inc.barrio} · ESTRATO ${inc.estrato}</div>` +
      `<div class="tt-sub">${inc.fechaTxt}</div>`;
    tooltip.style.left = (e.point.x + 16) + "px";
    tooltip.style.top = (e.point.y - 10) + "px";
    tooltip.classList.add("visible");
    map.getCanvas().style.cursor = "pointer";
    if (selected < 0) setPhase("FASE 2 · LENTE DE CONTEXTO");
  } else {
    tooltip.classList.remove("visible");
    map.getCanvas().style.cursor = "";
    if (selected < 0) setPhase(map.getZoom() > CONFIG.reveal3DZoom ? "VISTA 3D" : "FASE 1 · VISTA MACRO");
  }
});

map.on("click", e => {
  // sincroniza la lente con el punto de clic (gate del picking en vista macro)
  const mpp = 156543.03392 * Math.cos(e.lngLat.lat * Math.PI / 180) / Math.pow(2, map.getZoom());
  const [lcx, lcz] = mercLocal(e.lngLat.lng, e.lngLat.lat);
  layer3D.uniforms.uLens.value.set(lcx, lcz, CONFIG.lensRadiusPx * mpp);
  const [nx, ny] = ndc(e.point);
  const i = layer3D.pick(nx, ny);
  if (i < 0) { closeDetail(); return; }
  selected = i;
  const inc = incidents[i];
  layer3D.spawnSelectionFX(inc);          // el edificio seleccionado arde (fuego + humo)
  setPhase("FASE 3 · MICRO-ANÁLISIS");
  // Interpolación de cámara (paneo + zoom + rotación) a vista micro-isométrica.
  // essential:true ⇒ la animación corre aun con "prefers-reduced-motion" activo
  // (de lo contrario MapLibre salta al destino sin transición).
  // offset desplaza el encuadre a la izquierda para no ocultar el edificio tras la tarjeta.
  beginFlight({   // Ghost UI: la cromática ambiente recede mientras la cámara vuela al edificio
    center: [inc.lon, inc.lat], zoom: 17.2, pitch: 62, bearing: -28,
    duration: 2200, essential: true, offset: [-190, 20],
    easing: t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2, // cubic in-out
  });
  // Tarjeta de datos a la derecha
  document.getElementById("dp-title").textContent = inc.servicio;
  document.getElementById("dp-date").textContent = `${inc.fechaTxt} · ${inc.hora}`;
  document.getElementById("dp-loc").textContent = `${inc.barrio} — UPZ ${inc.upz}, ${inc.localidad} (Estrato ${inc.estrato})`;
  document.getElementById("dp-serv").textContent = `${inc.clase || "—"} · Causa: ${inc.causa}`;
  setupFacts(inc);   // bento de parámetros (T. respuesta, coordenadas, gravedad, estación…)
  setupMetrics([     // bento de afectación (count-up + barras por categoría)
    ["SIN SIGNOS", inc.sinSignos, "var(--c-sinsignos)"],
    ["HERIDOS", inc.heridos, "var(--c-heridos)"],
    ["RESCATADOS", inc.rescatados, "var(--c-rescatados)"],
    ["AFECTADOS", inc.afectados, "var(--c-afectados)"],
    ["EXPUESTOS", inc.expuestos, "var(--c-expuestos)"],
  ]);
  openPanel();       // muelle físico: montaje del panel con desaceleración natural
  revealBento();     // stagger Motion (spring de baja fricción) + arranque del count-up
});

function closeDetail(recenter = true) {
  if (selected < 0) return;
  selected = -1;
  closePanel();   // muelle físico: desmontaje del panel
  cancelMetrics();   // corta cualquier count-up en curso (evita solapes al reabrir)
  layer3D.clearSelectionFX();
  // Reversión suave a la perspectiva macro — SOLO en cierres iniciados por el usuario
  // (botón ✕ / Esc / clic en vacío, que llaman closeDetail() ⇒ recenter=true). Los cierres
  // por fin-de-vida al mover el timeline pasan recenter=false ⇒ no secuestran la cámara.
  if (recenter) {
    beginFlight({   // Ghost UI también en el regreso a la vista macro
      center: CONFIG.center, zoom: 12.5, pitch: 30, bearing: 0,
      duration: 1600, essential: true,
      easing: t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2,
    });
  }
  setPhase("FASE 1 · VISTA MACRO");
}
document.getElementById("close-panel").addEventListener("click", closeDetail);
document.addEventListener("keydown", e => { if (e.key === "Escape") closeDetail(); });

// Transición de revelado 3D por zoom: uReveal interpola en [z-1, z+0.5]
map.on("move", () => {
  if (!layer3D) return;
  const z = map.getZoom();
  const r = Math.min(1, Math.max(0, (z - (CONFIG.reveal3DZoom - 1)) / 1.5));
  layer3D.uniforms.uReveal.value = selected >= 0 ? 1 : r;
});

// ---- Timeline ----
// El slider se subdivide en CONFIG.timeScale pasos por día (rango numérico mayor):
// el periodo se despliega más largo y los incidentes quedan más separados en el tiempo.
const slider = document.getElementById("time-slider");
const readout = document.getElementById("date-readout");
const SLIDER_MAX = CONFIG.totalDays * CONFIG.timeScale;
slider.max = SLIDER_MAX;
slider.value = 0;                           // arranca en el día 0 (1-ene): lienzo limpio, sin incidentes prematuros
let showAll = false;            // VISTA GLOBAL activo (lo gobierna setShowAll)
function applyDay() {
  const d = (+slider.value) / CONFIG.timeScale;   // valor del slider → día real
  if (layer3D) layer3D.uniforms.uDay.value = d;
  readout.textContent = fmtDate(d);
  slider.style.setProperty("--fill", (+slider.value / SLIDER_MAX * 100) + "%");
  // Heatmap macro: misma ventana de vida que la GPU ⇒ día ∈ (d − LIFESPAN, d)
  // (estricta en ambos bordes: aparece tras su día ⇒ vacío en d=0; muere al cumplir 40 días).
  if (map.getLayer("heat"))
    map.setFilter("heat", showAll
      ? null                                                  // VISTA GLOBAL: heatmap sin ventana (todos los puntos históricos)
      : ["all", ["<", ["get", "day"], d], [">", ["get", "day"], d - CONFIG.lifespanDays]]);
  // Si el incidente seleccionado sale de su ventana de vida al mover el tiempo, ciérralo —
  // SIN recolocar la cámara: no es una acción del usuario, evita un flyTo intempestivo al
  // scrubear/reproducir. (Esto también retira sus efectos fuego/humo/glow vía clearSelectionFX.)
  if (!showAll && selected >= 0) {                            // en VISTA GLOBAL nada "expira" ⇒ no se autocierra la tarjeta
    const age = d - incidents[selected].day;
    if (age <= 0 || age >= CONFIG.lifespanDays) closeDetail(false);
  }
}
slider.addEventListener("input", applyDay);

/* ---------------------------------------------------------------
   4a-bis. GHOST UI (Transparencia Cinemática)
   La cromática AMBIENTE (header + leyenda) se vuelve translúcida durante CUALQUIER
   vuelo programático de cámara (Play panorámico, selección y regreso a macro) y
   recupera opacidad al asentarse la cámara (moveend). Quedan EXCLUIDAS a propósito:
   la Intel Card (tiene su muelle y es el foco) y la #timeline (control activo de la
   reproducción ⇒ nunca se bloquea ni se atenúa, así no hay lockout). Coste: opacity
   (compositor) en 2 nodos + un blur declarativo de una sola pasada; el "desenfoque
   extra" lo refuerza GRATIS el motion-blur de pantalla completa, ya activo en esta
   misma ventana de flyTo. El token de beginFlight evita parpadeos al encadenar vuelos
   (selecciones rápidas ⇒ se mantiene atenuada y restaura UNA vez al asentarse).
   --------------------------------------------------------------- */
const GHOST = [document.querySelector("header"), document.getElementById("legend")].filter(Boolean);   // timeline excluida: control vivo
let ghosted = false;
function setGhostUI(on) {
  if (on === ghosted) return;
  ghosted = on;
  const r = reduced();
  GHOST.forEach(el => {
    el.style.pointerEvents = on ? "none" : "";
    if (!M || r) { el.style.opacity = on ? "0.18" : ""; el.style.filter = on ? "blur(2.5px)" : ""; return; }
    const a = M.animate(el,
      { opacity: on ? 0.18 : 1, filter: on ? "blur(2.5px)" : "blur(0px)" },
      { duration: on ? 0.45 : 0.7, ease: [0.16, 1, 0.3, 1] });
    if (!on) a?.finished?.then(() => { el.style.filter = ""; }).catch(() => {});
  });
}
// flyTo cinemático: engancha la Ghost UI y la suelta en el moveend de ESTE vuelo. El
// token anti-solape evita que un handler obsoleto (vuelo interrumpido o encadenado)
// apague la translucidez del vuelo vigente.
let flightToken = 0;
function beginFlight(opts) {
  setGhostUI(true);
  const myToken = ++flightToken;
  map.flyTo(opts);
  map.once("moveend", () => { if (myToken === flightToken) setGhostUI(false); });
}
// Vuelo panorámico de inicio (al dar Play): elevación + órbita suave sobre la vista
// actual (zoom acotado ⇒ siempre lee "panorámico"); el motion-blur lo acompaña gratis.
function cinematicSweep() {
  if (!map || reduced() || selected >= 0) return;   // a11y / no secuestrar una tarjeta abierta
  beginFlight({
    center: map.getCenter(),
    zoom: Math.min(map.getZoom(), 13.2),
    pitch: 56, bearing: map.getBearing() - 28,
    duration: 3200, essential: true,
    easing: t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2,
  });
}

let playTimer = null;
document.getElementById("play-btn").addEventListener("click", function () {
  dismissCoach();   // primer uso del Play ⇒ descarta el onboarding permanentemente
  if (playTimer) { clearInterval(playTimer); playTimer = null; this.textContent = "▶"; return; }
  if (+slider.value >= SLIDER_MAX) slider.value = 0;
  this.textContent = "❚❚";
  cinematicSweep();   // Transparencia Cinemática: la UI se difumina durante el recorrido
  playTimer = setInterval(() => {
    slider.value = +slider.value + 1;
    applyDay();
    if (+slider.value >= SLIDER_MAX) { clearInterval(playTimer); playTimer = null; document.getElementById("play-btn").textContent = "▶"; }
  }, 35);
});

/* ---------------------------------------------------------------
   4g. VISTA GLOBAL (override del ciclo de vida de 40 días) + Onboarding del Play
   Anula la ventana rodante en la GPU vía un único uniform (u_showAll) que render()
   interpola 0↔1 (rampa suave, sin rAF nuevo). NO se itera el dataset en JS: el VS ya
   procesa las 20K instancias cada frame; "mostrar todo" sólo cambia cuántas rasterizan
   (la geometría fuera de ventana crece desde 0 ⇒ overdraw gradual, sin congelar la pestaña).
   --------------------------------------------------------------- */
const showallBtn = document.getElementById("showall-btn");
function setShowAll(on) {
  showAll = on;
  if (layer3D) {
    layer3D.uniforms.u_showAllTarget.value = on ? 1 : 0;
    if (reduced()) layer3D.uniforms.u_showAll.value = on ? 1 : 0;   // a11y: sin rampa, salto directo
  }
  if (showallBtn) showallBtn.setAttribute("aria-pressed", on ? "true" : "false");
  applyDay();          // re-aplica el heatmap acorde al modo (sin ventana si on)
  dismissCoach();      // usar cualquier control descarta el onboarding
}
if (showallBtn) showallBtn.addEventListener("click", () => setShowAll(!showAll));

/* ---- Onboarding del Play: tooltip flotante + anillo pulsante; descarte PERMANENTE al 1er uso ---- */
let coachDone = false;
const playCoach = document.getElementById("play-coach");
const playBtnEl = document.getElementById("play-btn");
function showCoach() {
  if (coachDone || !playCoach) return;
  playBtnEl.classList.add("coach");                                // anillo (CSS; reduced-motion lo apaga)
  if (M && !reduced()) M.animate(playCoach, { opacity: [0, 1], y: [6, 0] }, { duration: 0.5, ease: [0.16, 1, 0.3, 1] });
  else playCoach.style.opacity = "1";
}
function dismissCoach() {
  if (coachDone) return;
  coachDone = true;
  if (playBtnEl) playBtnEl.classList.remove("coach");
  if (!playCoach) return;
  if (M && !reduced()) {
    const a = M.animate(playCoach, { opacity: [1, 0], y: [0, 4] }, { duration: 0.3, ease: "easeIn" });
    (a && a.finished ? a.finished : Promise.resolve()).then(() => playCoach.remove()).catch(() => playCoach.remove());
  } else { playCoach.remove(); }
}
slider.addEventListener("input", dismissCoach);                    // idempotente (Play/VISTA GLOBAL/mapa también lo invocan)
map.getCanvasContainer().addEventListener("pointerdown", dismissCoach);

/* ---------------------------------------------------------------
   4b. CINEMÁTICA: motion-blur por velocidad de cámara + muelles UI
   --------------------------------------------------------------- */
// ---- MOTION BLUR dirigido por la velocidad de cámara ----
// MapLibre posee el framebuffer y compone el basemap; Three.js sólo dibuja los
// edificios dentro de ese contexto. Un EffectComposer desenfocaría SÓLO la
// geometría WebGL (no el mapa) y rompería la composición, además de gastar pases
// de pantalla completa. Ruta elegida (la más ligera y coherente): un filtro SVG
// anisótropo sobre el canvas COMPLETO, alimentado por la velocidad de cámara en
// espacio-pantalla. En reposo se desconecta (filter:none ⇒ coste cero); sólo se
// engancha en paneos/zoom/flyTo rápidos. El blur es direccional: stdDeviation por
// eje ∝ |velocidad_x|, |velocidad_y| (paneo) + término isótropo (zoom/rot/pitch).
const mblurGauss = document.getElementById("mblur-gauss");
let prevCenter = null, prevZoom = null, prevBearing = null, prevPitch = null;
let blurX = 0, blurY = 0, blurOn = false;

// Curva de respuesta VELOCIDAD→DESENFOQUE (px/frame → stdDeviation en px).
// Antes el mapeo era lineal 1:1 (stdDeviation = velocidad), de modo que un
// paneo lento de 2-3 px/frame ya producía un gaussiano de 2-3 px que arruinaba
// la legibilidad. Se sustituye por «zona muerta + curva potencia»:
//   · Por debajo de V0 el blur es exactamente 0  ⇒ paneos lentos e inercia
//     residual quedan nítidos y el filtro se desengancha (coste GPU 0).
//   · Entre V0 y V1 la magnitud crece como t^GAMMA (GAMMA>1): el exponente
//     comprime el tramo bajo-medio y sólo deja florecer el blur cerca de V1.
//   · En V1 (flings de inercia y flyTo) se alcanza el desenfoque máximo MAX.
// Se descartó smoothstep porque su pendiente es MÁXIMA en el punto medio —
// justo el rango que queremos mantener en calma. El coste del feGaussianBlur
// crece con el radio del kernel (∝ std), así que rebajar la magnitud media es
// además un ahorro neto de GPU, no sólo una mejora de legibilidad.
const BLUR = {
  V0: 2.2,    // px/frame — umbral de activación (zona muerta): por debajo, nitidez total
  V1: 15,     // px/frame — velocidad de saturación: aquí se alcanza el blur máximo
  GAMMA: 2.4, // >1 ⇒ comprime el rango bajo-medio, reserva la distorsión para lo rápido
  MAX: 7,     // stdDeviation máximo (px) en saturación
  OFF: 0.4,   // por debajo de este stdDeviation se desengancha el filtro (coste 0)
};
function velocityToBlur(v) {
  const t = (v - BLUR.V0) / (BLUR.V1 - BLUR.V0);   // normaliza a la ventana de activación
  if (t <= 0) return 0;                            // zona muerta: sin desenfoque
  return BLUR.MAX * Math.pow(t < 1 ? t : 1, BLUR.GAMMA);
}

{   // El motion-blur acompaña al flyTo (essential:true): por coherencia, siempre activo.
  map.on("render", () => {
    const c = map.getCenter();
    let px = 0, py = 0;
    if (prevCenter) {
      const sp = map.project(prevCenter);     // dónde cae el centro anterior ahora
      const sc = map.project(c);              // centro actual (≈ centro de pantalla)
      px = sp.x - sc.x; py = sp.y - sc.y;      // desplazamiento de paneo en píxeles/frame
    }
    prevCenter = c;
    const z = map.getZoom(), b = map.getBearing(), pit = map.getPitch();
    const dz = prevZoom    != null ? Math.abs(z - prevZoom)     : 0;
    const db = prevBearing != null ? Math.abs(b - prevBearing)  : 0;
    const dp = prevPitch   != null ? Math.abs(pit - prevPitch)  : 0;
    prevZoom = z; prevBearing = b; prevPitch = pit;

    // zoom/rotación/pitch no mueven el punto central ⇒ término isótropo adicional
    const iso = dz * 26 + db * 0.7 + dp * 0.55;
    // velocidad de cámara por eje → magnitud de blur a través de la curva no lineal
    const tx = velocityToBlur(Math.abs(px) + iso);
    const ty = velocityToBlur(Math.abs(py) + iso);

    // subida inmediata al objetivo, caída exponencial (0.80/frame) al detenerse.
    // velocityToBlur ya acota a [0, MAX] ⇒ el arrastre decae pero nunca lo supera.
    blurX = Math.max(tx, blurX * 0.80);
    blurY = Math.max(ty, blurY * 0.80);

    if (blurX < BLUR.OFF && blurY < BLUR.OFF) {
      if (blurOn) { map.getCanvas().style.filter = ""; blurOn = false; }
    } else {
      mblurGauss.setAttribute("stdDeviation", blurX.toFixed(2) + " " + blurY.toFixed(2));
      if (!blurOn) { map.getCanvas().style.filter = "url(#mblur)"; blurOn = true; }
    }
    updateTilt(performance.now());          // tilt 3D por proximidad (piggyback: cero rAF nuevo)
  });
}

/* ---------------------------------------------------------------
   4d. TILT 3D POR PROXIMIDAD DE LOS DECORATIVOS (honra interactions.md)
   Los decorativos llevan pointer-events:none (no bloquean el mapa) ⇒ su "hover"
   NO puede venir de :hover CSS: se calcula por PROXIMIDAD del cursor. Física de
   interactions.md preservada: radio 150px, retorno lerp 0.05 (seguimiento 0.12),
