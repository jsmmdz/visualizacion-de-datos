<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UAECOB · Análisis Espacio-Temporal de Incidentes 3D</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<style>
  /* ============ SISTEMA DE DISEÑO GLOBAL ============
     Mapa base: monocromático B/N. Colores de alerta reservados
     exclusivamente para datos WebGL y acentos de UI de datos. */
  :root {
    --ink: #f2f2f2;
    --ink-dim: #8a8a8a;
    --bg-panel: rgba(10, 10, 12, 0.55);
    --line: rgba(255, 255, 255, 0.14);
    --c-sinsignos: #b3122e;
    --c-heridos: #ff6a00;
    --c-rescatados: #00ffb3;
    --c-afectados: #ffe000;
    --c-expuestos: #2979ff;
    --font: "Inter", "Segoe UI", system-ui, sans-serif;
    --mono: "JetBrains Mono", "Consolas", monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #000; overflow: hidden; font-family: var(--font); }
  #map { position: absolute; inset: 0; }

  /* ---- Cabecera editorial minimalista ---- */
  header {
    position: absolute; top: 0; left: 0; right: 0; z-index: 10;
    padding: 22px 28px; pointer-events: none;
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  header h1 {
    color: var(--ink); font-size: 13px; font-weight: 600;
    letter-spacing: 0.28em; text-transform: uppercase;
  }
  header h1 span { color: var(--ink-dim); font-weight: 400; }
  #phase-indicator {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em;
    color: var(--ink-dim); text-transform: uppercase; text-align: right;
  }

  /* ---- Timeline (único control visible en Fase 1) ---- */
  #timeline {
    position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
    z-index: 10; width: min(680px, 86vw);
    background: var(--bg-panel); border: 1px solid var(--line);
    backdrop-filter: blur(12px) saturate(150%); -webkit-backdrop-filter: blur(12px) saturate(150%);
    border-radius: 10px; padding: 14px 20px 12px;
    transition: opacity 0.4s ease;
  }
  #timeline .row { display: flex; align-items: center; gap: 14px; }
  #timeline label {
    font-family: var(--mono); font-size: 10px; color: var(--ink-dim);
    letter-spacing: 0.15em; text-transform: uppercase; white-space: nowrap;
  }
  #date-readout {
    font-family: var(--mono); font-size: 12px; color: var(--ink);
    min-width: 150px; text-align: right;
  }
  #play-btn {
    background: none; border: 1px solid var(--line); color: var(--ink);
    width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
    font-size: 10px; line-height: 1; transition: border-color 0.2s, transform 0.2s;
  }
  #play-btn:hover { border-color: var(--ink); transform: scale(1.08); }
  input[type="range"] {
    flex: 1; -webkit-appearance: none; appearance: none; height: 2px;
    background: linear-gradient(90deg, var(--ink) var(--fill, 100%), rgba(255,255,255,0.15) var(--fill, 100%));
    border-radius: 2px; outline: none; cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
    background: #fff; border: none;
    box-shadow: 0 0 0 4px rgba(255,255,255,0.12);
    transition: box-shadow 0.2s;
  }
  input[type="range"]::-webkit-slider-thumb:hover { box-shadow: 0 0 0 7px rgba(255,255,255,0.18); }

  /* ---- Tooltip de hover (lente de contexto) ---- */
  #tooltip {
    position: absolute; z-index: 20; pointer-events: none;
    background: var(--bg-panel); border: 1px solid var(--line);
    backdrop-filter: blur(12px) saturate(150%); -webkit-backdrop-filter: blur(12px) saturate(150%);
    border-radius: 8px; padding: 10px 14px; max-width: 260px;
    opacity: 0; transform: translateY(6px); transition: opacity 0.18s ease, transform 0.18s ease;
    font-size: 11px; color: var(--ink); line-height: 1.5;
  }
  #tooltip.visible { opacity: 1; transform: translateY(0); }
  #tooltip .tt-title { font-weight: 600; font-size: 11px; letter-spacing: 0.06em; }
  #tooltip .tt-sub { color: var(--ink-dim); font-family: var(--mono); font-size: 9.5px; }

  /* ---- Panel lateral (Fase 3: micro-análisis) ---- */
  #detail-panel {
    position: absolute; top: 0; right: 0; bottom: 0; z-index: 15;
    width: min(380px, 92vw);
    background: var(--bg-panel); border-left: 1px solid var(--line);
    backdrop-filter: blur(12px) saturate(150%); -webkit-backdrop-filter: blur(12px) saturate(150%);
    padding: 80px 30px 30px; color: var(--ink); overflow-y: auto;
    /* El montaje/desmontaje lo gobierna un muelle físico en JS (translateX/scale),
       no una transición temporal: por eso aquí NO hay transition de transform. */
    transform: translateX(100%); opacity: 0; pointer-events: none;
    will-change: transform, opacity;
  }
  #detail-panel h2 { font-size: 15px; font-weight: 600; letter-spacing: 0.04em; margin-bottom: 4px; }
  #detail-panel .dp-date { font-family: var(--mono); font-size: 10px; color: var(--ink-dim); letter-spacing: 0.12em; margin-bottom: 24px; text-transform: uppercase; }
  .dp-section { margin-bottom: 22px; }
  .dp-label { font-family: var(--mono); font-size: 9px; color: var(--ink-dim); letter-spacing: 0.22em; text-transform: uppercase; margin-bottom: 6px; }
  .dp-value { font-size: 12.5px; line-height: 1.55; }
  .dp-metric { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.07); }
  .dp-metric .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 10px; flex: none; }
  .dp-metric .name { flex: 1; font-size: 11px; letter-spacing: 0.05em; }
  .dp-metric .count { font-family: var(--mono); font-size: 14px; font-weight: 600; }
  #close-panel {
    position: absolute; top: 26px; right: 26px; background: none;
    border: 1px solid var(--line); color: var(--ink); width: 30px; height: 30px;
    border-radius: 50%; cursor: pointer; font-size: 13px;
    transition: border-color 0.2s, transform 0.2s;
  }
  #close-panel:hover { border-color: var(--ink); transform: rotate(90deg); }

  /* ---- Leyenda ---- */
  #legend {
    position: absolute; left: 28px; bottom: 28px; z-index: 9;
    font-family: var(--mono); font-size: 9.5px; color: var(--ink-dim);
    letter-spacing: 0.1em; line-height: 2; opacity: 0; transition: opacity 0.6s;
  }
  #legend.visible { opacity: 1; }
  #legend .li { display: flex; align-items: center; gap: 8px; }
  #legend .sw { width: 9px; height: 9px; border-radius: 2px; }

  #loader {
    position: absolute; inset: 0; z-index: 50; background: #000;
    display: flex; flex-direction: column; gap: 14px;
    align-items: center; justify-content: center; color: var(--ink-dim);
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.3em;
    transition: opacity 0.7s; text-transform: uppercase;
  }
  #loader .bar { width: 180px; height: 1px; background: rgba(255,255,255,0.12); overflow: hidden; }
  #loader .bar i { display: block; height: 100%; width: 30%; background: #fff; animation: scan 1.1s infinite linear; }
  @keyframes scan { from { transform: translateX(-100%);} to { transform: translateX(600%);} }
</style>
</head>
<body>
<div id="map"></div>

<!-- Filtro de MOTION BLUR (anisótropo, dirigido por la velocidad de cámara).
     stdDeviation se reescribe por frame desde JS; el filtro sólo se engancha al
     canvas durante el movimiento (en reposo: filter:none ⇒ coste cero). -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <filter id="mblur" x="-15%" y="-15%" width="130%" height="130%" color-interpolation-filters="sRGB">
    <feGaussianBlur id="mblur-gauss" in="SourceGraphic" stdDeviation="0 0" edgeMode="duplicate"/>
  </filter>
</svg>

<header>
  <h1>UAECOB <span>/ INCIDENTES 2020 · BOGOTÁ D.C.</span></h1>
  <div id="phase-indicator">FASE 1 · VISTA MACRO</div>
</header>

<div id="timeline">
  <div class="row">
    <button id="play-btn" title="Reproducir línea de tiempo">▶</button>
    <label>Timeline</label>
    <input type="range" id="time-slider" min="0" max="243" value="243" step="1" />
    <div id="date-readout">—</div>
  </div>
</div>

<div id="tooltip"></div>

<div id="legend">
  <div class="li"><span class="sw" style="background:var(--c-sinsignos)"></span>SIN SIGNOS</div>
  <div class="li"><span class="sw" style="background:var(--c-heridos)"></span>HERIDOS</div>
  <div class="li"><span class="sw" style="background:var(--c-rescatados)"></span>RESCATADOS</div>
  <div class="li"><span class="sw" style="background:var(--c-afectados)"></span>AFECTADOS</div>
  <div class="li"><span class="sw" style="background:var(--c-expuestos)"></span>EXPUESTOS</div>
</div>

<div id="detail-panel">
  <button id="close-panel">✕</button>
  <h2 id="dp-title">—</h2>
  <div class="dp-date" id="dp-date">—</div>
  <div class="dp-section"><div class="dp-label">Ubicación</div><div class="dp-value" id="dp-loc">—</div></div>
  <div class="dp-section"><div class="dp-label">Servicio / Causa</div><div class="dp-value" id="dp-serv">—</div></div>
  <div class="dp-section"><div class="dp-label">Respuesta</div><div class="dp-value" id="dp-resp">—</div></div>
  <div class="dp-section"><div class="dp-label">Categorías de afectación</div><div id="dp-metrics"></div></div>
</div>

<div id="loader"><div>Procesando 20K registros</div><div class="bar"><i></i></div></div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
/* =====================================================================
   MAPA INTERACTIVO 3D — INCIDENTES UAECOB
   Arquitectura: MapLibre GL (basemap monocromático + heatmap macro)
   + CustomLayer Three.js (InstancedMesh: geometría, halos, partículas).
   Draw calls del layer 3D: 3 instanced (formas) + 1 instanced (halos)
   + 1 Points (partículas selección) + 1 mesh (glow EXPUESTOS) ≤ 6.
   ===================================================================== */

const CONFIG = {
  center: [-74.085, 4.62],
  epoch: Date.UTC(2020, 0, 1),            // día 0 del dataset
  totalDays: 243,                          // 1-ene → 31-ago 2020
  decayK: 0.025,                           // alpha(t) = max(0.06, exp(-k * Δdías))
  lensRadiusPx: 160,                       // radio de la lente de contexto (px pantalla)
  reveal3DZoom: 14.5,                      // zoom a partir del cual el 3D es permanente
  baseHeight: 55,                          // altura base de extrusión (m)
  timeScale: 5,                            // subdivisiones del slider por día: timeline más largo
                                           // ⇒ los incidentes se despliegan con más separación
  haloStrobe: 1.0,                         // días de la fase de titileo estroboscópico (sirena)
  haloFade: 2.6,                           // días de la fase de desvanecimiento exponencial
};

const COLORS = {
  SIN_SIGNOS: new THREE.Color(0xb3122e),
  HERIDOS:    new THREE.Color(0xff6a00),
  RESCATADOS: new THREE.Color(0x00ffb3),
  AFECTADOS:  new THREE.Color(0xffe000),
  EXPUESTOS:  new THREE.Color(0x2979ff),
  NEUTRO:     new THREE.Color(0xd8d8d8),
};

const MESES = { enero:0, febrero:1, marzo:2, abril:3, mayo:4, junio:5, julio:6, agosto:7, septiembre:8, octubre:9, noviembre:10, diciembre:11 };

/* ---------------------------------------------------------------
   1. INGESTA Y NORMALIZACIÓN DE DATOS
   Las coordenadas del CSV usan punto como separador de millar:
   "458.675.670.000.008" ≡ 4.58675670000008. Reconstrucción:
   se eliminan los puntos y se inserta el decimal tras el primer
   dígito (latitud ~4.x) o tras los dos primeros (longitud ~74.x).
   --------------------------------------------------------------- */
function parseLat(raw) {
  const d = raw.replace(/[^0-9]/g, "");
  if (d.length < 3) return NaN;
  return parseFloat(d[0] + "." + d.slice(1));
}
function parseLon(raw) {
  const d = raw.replace(/[^0-9]/g, "");
  if (d.length < 4) return NaN;
  return -parseFloat(d.slice(0, 2) + "." + d.slice(2));
}
function parseFecha(raw) {
  // formato: "miércoles 1 de enero de 2020"
  const m = raw.toLowerCase().match(/(\d{1,2}) de ([a-záéíóúñ]+) de (\d{4})/);
  if (!m) return null;
  const mes = MESES[m[2]];
  if (mes === undefined) return null;
  return new Date(Date.UTC(+m[3], mes, +m[1]));
}
function sumCols(cols, idxs) {
  let s = 0;
  for (const i of idxs) { const v = parseInt(cols[i], 10); if (!isNaN(v)) s += v; }
  return s;
}
// Forma según naturaleza del servicio: fuego → pirámide (0),
// rescate → esfera (1), resto → cilindro (2).
function shapeFor(servicio, clase) {
  const s = (servicio + " " + clase).toUpperCase();
  if (/INCENDIO|QUEMA|FUEGO|EXPLOS|FUGA/.test(s)) return 0;
  if (/RESCATE/.test(s)) return 1;
  return 2;
}

async function loadData() {
  const res = await fetch("incidentes.csv");
  const buf = await res.arrayBuffer();
  // El CSV de datos abiertos viene en latin-1 / windows-1252
  let text;
  try { text = new TextDecoder("windows-1252").decode(buf); }
  catch { text = new TextDecoder("utf-8").decode(buf); }
  const lines = text.split(/\r?\n/);
  const H = lines[0].split(";").map(h => h.trim().toUpperCase());
  const col = name => H.findIndex(h => h.includes(name));
  const I = {
    fecha: col("FECHA"), num: col("MERO SERVICIO"), estacion: col("ESTACI"),
    lat: col("LATITUD"), lon: col("LONGITUD"), barrio: col("BARRIO"),
    estrato: col("ESTRATO"), upz: col("UPZ"), localidad: col("LOCALIDAD"),
    hora: col("HORA"), tresp: col("TIEMPO"),
    servicio: H.findIndex(h => h === "SERVICIO"),
    clase: col("CLASE DE SERVICIO"), causa: col("CAUSAS"),
  };
  const range = (start) => [start, start + 1, start + 2, start + 3];
  const iExp = H.findIndex(h => h.includes("EXPUESTOS"));
  const iAfe = H.findIndex(h => h.includes("AFECTADOS"));
  const iRes = H.findIndex(h => h.includes("RESCATADOS"));
  const iHer = H.findIndex(h => h.includes("HERIDOS"));
  const iSin = H.findIndex(h => h.includes("SIN SIGNOS"));

  const incidents = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i]) continue;
    const c = lines[i].split(";");
    if (c.length < 20) continue;
    const lat = parseLat(c[I.lat] || ""), lon = parseLon(c[I.lon] || "");
    // Filtro al bounding box de Bogotá D.C.; descarta coordenadas corruptas
    if (isNaN(lat) || isNaN(lon) || lat < 3.7 || lat > 4.95 || lon < -74.5 || lon > -73.8) continue;
    const date = parseFecha(c[I.fecha] || "");
    if (!date) continue;
    const day = Math.round((date.getTime() - CONFIG.epoch) / 86400000);
    if (day < 0 || day > CONFIG.totalDays) continue;
    const estrato = Math.min(6, Math.max(1, parseInt(c[I.estrato], 10) || 3));
    incidents.push({
      lat, lon, day, estrato,
      barrio: c[I.barrio] || "—", upz: c[I.upz] || "—", localidad: c[I.localidad] || "—",
      estacion: c[I.estacion] || "—", num: c[I.num] || "—",
      hora: c[I.hora] || "—", tresp: c[I.tresp] || "—",
      servicio: c[I.servicio] || "—", clase: c[I.clase] || "—", causa: c[I.causa] || "—",
      fechaTxt: c[I.fecha] || "—",
      shape: shapeFor(c[I.servicio] || "", c[I.clase] || ""),
      expuestos: sumCols(c, range(iExp)),
      afectados: sumCols(c, range(iAfe)),
      rescatados: sumCols(c, range(iRes)),
      heridos: sumCols(c, range(iHer)),
      sinSignos: sumCols(c, range(iSin)),
    });
  }
  return incidents;
}

// Color dominante: prioridad por gravedad descendente
function dominantColor(inc) {
  if (inc.sinSignos > 0) return COLORS.SIN_SIGNOS;
  if (inc.heridos > 0) return COLORS.HERIDOS;
  if (inc.rescatados > 0) return COLORS.RESCATADOS;
  if (inc.afectados > 0) return COLORS.AFECTADOS;
  if (inc.expuestos > 0) return COLORS.EXPUESTOS;
  return COLORS.NEUTRO;
}

/* ---------------------------------------------------------------
   2. MAPA BASE MONOCROMÁTICO + HEATMAP MACRO (FASE 1)
   --------------------------------------------------------------- */
const map = new maplibregl.Map({
  container: "map",
  style: "https://basemaps.cartocdn.com/gl/dark-matter-nolabels-gl-style/style.json",
  center: CONFIG.center,
  zoom: 10.6,
  pitch: 0,
  antialias: true,
  maxPitch: 70,
  // Inercia de cámara: la cámara es la de MapLibre (NO un OrbitControls de Three;
  // la cámara 3D se esclaviza a esta matriz por frame en render()). La inercia
  // NATIVA de dragPan no producía un glide fiable en este visor (custom layer +
  // triggerRepaint continuo), así que la ANULAMOS aquí (maxSpeed:0 ⇒ sin inercia
  // nativa, el arrastre directo se conserva) y la reimplementamos explícitamente
  // más abajo (sección 4c) con un integrador de momento sobre esta misma cámara.
  dragPan: { maxSpeed: 0 },
});
// Zoom de rueda más orgánico (paso por incremento menor ⇒ desaceleración fina)
map.scrollZoom.setZoomRate(1 / 130);

/* ---------------------------------------------------------------
   3. CAPA 3D (Three.js custom layer)
   Posiciones en coordenadas Mercator relativas a un origen común;
   un solo modelMatrix las lleva al espacio de la cámara de MapLibre.
   --------------------------------------------------------------- */
let incidents = [];
let layer3D = null;
let selected = -1;

const ORIGIN = maplibregl.MercatorCoordinate.fromLngLat(CONFIG.center, 0);
const METER = ORIGIN.meterInMercatorCoordinateUnits();

function mercLocal(lon, lat) {
  const m = maplibregl.MercatorCoordinate.fromLngLat([lon, lat], 0);
  return [(m.x - ORIGIN.x) / METER, (m.y - ORIGIN.y) / METER];
}

// ---- Shaders de EDIFICIOS (cajas con ventanas emisivas) ----
// Migrados de la escena cinemática y adaptados al custom layer de MapLibre:
// como aquí no hay luces ni postproceso, el material de ventanas se reimplementa
// en un ShaderMaterial propio que sí respeta la línea de tiempo (uDay), la lente
// de contexto (uLens) y el revelado por zoom/selección (uReveal).
//   iDim  = ancho·alto·profundidad (m) de cada edificio (∝ severidad)
//   iBurn = 0..1 intensidad de incendio (víctimas) ⇒ ventanas altas en llamas
const VERT_BUILDING = `
  attribute vec3 iOffset;      // base del edificio en coords locales (m)
  attribute vec3 iColor;       // color de la categoría dominante
  attribute float iDay;        // día del incidente desde epoch
  attribute vec3 iDim;         // ancho, alto, profundidad (m)
  attribute float iSeed;
  attribute float iBurn;       // 0..1 intensidad de incendio
  uniform float uTime;
  uniform float uDay;
  uniform vec3 uLens;
  uniform float uReveal;
  varying vec3 vColor;
  varying float vAlpha;
  varying vec3 vObj;
  varying vec3 vNrm;
  varying float vSeed;
  varying float vBurn;
  varying float vH;
  void main() {
    vColor = iColor; vSeed = iSeed; vBurn = iBurn; vNrm = normal; vH = iDim.y;
    vec3 p = position * iDim;          // caja unidad (base en y=0) → volumen w×h×d
    vObj = p;
    vec3 world = p + iOffset;
    // Decaimiento temporal: alpha = exp(-k·Δdías); suelo alto (0.85) ⇒ edificios sólidos,
    // no fantasmales, conservando un leve gradiente de antigüedad
    float dt = uDay - iDay;
    float visible = step(0.0, dt);                       // futuro ⇒ oculto
    float decay = max(0.85, exp(-${CONFIG.decayK.toFixed(4)} * dt));
    // Lente de contexto: borde suave de 25% del radio
    float dLens = distance(world.xz, uLens.xy);
    float lens = 1.0 - smoothstep(uLens.z * 0.75, uLens.z, dLens);
    vAlpha = visible * decay * max(lens, uReveal);
    gl_Position = projectionMatrix * modelViewMatrix * vec4(world, 1.0);
  }
`;
const FRAG_BUILDING = `
  precision highp float;
  uniform float uTime;
  varying vec3 vColor;
  varying float vAlpha;
  varying vec3 vObj;
  varying vec3 vNrm;
  varying float vSeed;
  varying float vBurn;
  varying float vH;
  float bhash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7)) + vSeed * 57.0) * 43758.5453); }
  void main() {
    if (vAlpha < 0.01) discard;
    // Cuerpo: hormigón oscuro, levemente tintado por la categoría
    vec3 col = vec3(0.045, 0.05, 0.06) + vColor * 0.05;
    if (vNrm.y > 0.5) col += vColor * 0.05 + 0.015;      // cubierta algo más clara
    // Ventanas: rejilla 4.4×3.4 m sobre caras laterales (normal horizontal)
    if (abs(vNrm.y) < 0.5) {
      vec2 wc = abs(vNrm.x) > 0.5 ? vObj.zy : vObj.xy;
      vec2 cell = floor(wc / vec2(4.4, 3.4));
      vec2 f = fract(wc / vec2(4.4, 3.4));
      float win = step(0.30, f.x) * step(f.x, 0.68) * step(0.34, f.y) * step(f.y, 0.74);
      // Ventanas vivas: cada celda titila y algunas se encienden/apagan en el tiempo,
      // con ritmo y fase propios (por edificio y por ventana) ⇒ toda la ciudad animada.
      float hc = bhash(cell);
      float litBase = step(0.80, hc);                                     // ~20% siempre encendidas
      float band = step(0.58, hc) * (1.0 - step(0.80, hc));               // franja intermedia que titila
      float cycle = step(0.0, sin(uTime * (0.5 + hc * 1.5) + hc * 50.0)); // encendido/apagado lento
      float lit = max(litBase, band * cycle);
      float twinkle = 0.65 + 0.35 * sin(uTime * (2.5 + hc * 4.0) + hc * 25.0); // parpadeo de brillo
      col += win * lit * vec3(1.0, 0.78, 0.45) * 0.6 * twinkle;           // luz cálida interior animada
      // Edificio en llamas (víctimas): plantas altas parpadean con el color de datos
      if (vBurn > 0.01) {
        float fl = 0.5 + 0.5 * sin(uTime * 9.0 + bhash(cell) * 40.0);
        float upper = smoothstep(0.2, 0.9, vObj.y / max(vH, 1.0));
        col += win * step(0.5, bhash(cell + 7.0)) * vColor * fl * upper * vBurn * 1.3;
      }
    }
    // Edificios 100% sólidos: el alpha (vAlpha) solo decide el descarte (futuro / fuera
    // de lente); el fragmento visible se emite totalmente opaco, sin translucidez.
    gl_FragColor = vec4(col, 1.0);
  }
`;

// ---- Halos de estrato ----
// Radio e intensidad inversamente proporcionales al estrato:
// f(e) = (7 − e) / 6  ⇒  estrato 1 → 1.0, estrato 6 → 0.167
const VERT_HALO = `
  attribute vec3 iOffset;
  attribute vec3 iColor;
  attribute float iDay;
  attribute float iEstrato;
  attribute float iSeed;
  uniform float uTime;
  uniform float uDay;
  uniform vec3 uLens;
  uniform float uReveal;
  varying vec3 vColor;
  varying float vAlpha;
  varying vec2 vUv;
  varying float vIntensity;
  void main() {
    vUv = uv * 2.0 - 1.0;
    float f = (7.0 - iEstrato) / 6.0;
    vIntensity = f;
    vColor = iColor;
    vec3 p = position * (30.0 + 110.0 * f);  // radio del halo en metros
    vec3 world = p + iOffset; world.y = 0.5;
    // Secuencia temporal por incidente — dt = días desde su aparición (según el slider):
    //   Fase 1 (0 .. T1): TITILEO ESTROBOSCÓPICO tipo sirena de bomberos (rápido, en tiempo real)
    //   Fase 2 (T1 .. T1+T2): DESVANECIMIENTO exponencial rápido y suave hacia opacidad 0
    float dt = uDay - iDay;
    float T1 = ${CONFIG.haloStrobe.toFixed(2)};
    float T2 = ${CONFIG.haloFade.toFixed(2)};
    float strobe = mix(0.12, 1.0, step(0.0, sin(uTime * 44.0 + iSeed * 39.0)));  // ~7 Hz on/off
    float env = 0.0;
    if (dt >= 0.0 && dt < T1) {
      env = strobe;                                          // Fase 1: titileo
    } else if (dt >= T1 && dt <= T1 + T2) {
      env = exp(-4.0 * (dt - T1) / T2);                      // Fase 2: fade exponencial → ~0
    }
    float dLens = distance(world.xz, uLens.xy);
    float lens = 1.0 - smoothstep(uLens.z * 0.75, uLens.z, dLens);
    vAlpha = env * max(lens, uReveal);
    gl_Position = projectionMatrix * modelViewMatrix * vec4(world, 1.0);
  }
`;
const FRAG_HALO = `
  precision highp float;
  varying vec3 vColor;
  varying float vAlpha;
  varying vec2 vUv;
  varying float vIntensity;
  void main() {
    float r = length(vUv);
    if (r > 1.0 || vAlpha < 0.01) discard;
    // anillo concéntrico: máximo en r≈0.55, caída radial suave
    float ring = smoothstep(0.0, 0.55, r) * (1.0 - smoothstep(0.55, 1.0, r));
    gl_FragColor = vec4(vColor, ring * vAlpha * (0.35 + 0.7 * vIntensity));
  }
`;

// ---- Fuego + humo del incidente seleccionado (migrado de la escena cinemática) ----
// Por partícula: aSite = centro de la cubierta, aSpan = w×d de la huella,
// aColor = categoría dominante, aRand = aleatorios, aSev = severidad normalizada.
// El emisor cubre el rectángulo del techo ⇒ el fuego se adapta a la forma del edificio.
const FIRE_VS = `
  attribute vec3 aSite; attribute vec2 aSpan; attribute vec3 aColor;
  attribute vec3 aRand; attribute float aSev;
  uniform float uTime;
  varying vec3 vColor; varying float vT; varying float vSeed;
  void main() {
    vColor = aColor; vSeed = aRand.x;
    float t = fract(uTime * (0.55 + aRand.z * 0.5) + aRand.x);   // ciclo de vida
    vT = t;
    // rejilla aleatoria dentro de w×d que converge al centro al subir
    vec2 spread = (vec2(aRand.x, aRand.y) - 0.5) * aSpan * (1.0 - t * 0.55);
    float rise = t * (16.0 + aSev * 46.0);                       // llama más alta y voraz
    vec3 p = aSite + vec3(spread.x, rise, spread.y);
    p.x += sin(uTime * 3.0 + aRand.y * 20.0 + t * 7.0) * (1.0 + t * 2.5);
    p.z += cos(uTime * 2.4 + aRand.x * 17.0 + t * 6.0) * (1.0 + t * 2.0);
    vec4 mv = modelViewMatrix * vec4(p, 1.0);
    float s = (1.0 - t) * (1.0 - t) * (13.0 + aSev * 40.0) + 2.5; // llamas más grandes
    gl_PointSize = min(s * 360.0 / -mv.z, 120.0);                // tope de px mayor
    gl_Position = projectionMatrix * mv;
  }
`;
const FIRE_FS = `
  precision highp float;
  uniform float uTime;
  varying vec3 vColor; varying float vT; varying float vSeed;
  float h2(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }
  void main() {
    vec2 q = gl_PointCoord * 2.0 - 1.0;
    float r = length(q);
    if (r > 1.0) discard;
    // máscara de llama: núcleo blando + rotura por ruido animado
    float n = h2(floor(q * 5.0 + vec2(0.0, uTime * 14.0) + vSeed * 60.0));
    float mask = smoothstep(1.0, 0.15, r + n * 0.45);
    // rampa térmica: núcleo blanco-cálido → color de datos → extinción
    vec3 core = vec3(1.0, 0.95, 0.75);
    vec3 col = mix(core, vColor, smoothstep(0.0, 0.18, vT));
    col = mix(col, vColor * 0.2, smoothstep(0.55, 1.0, vT));
    float a = mask * (1.0 - vT);                                 // más opaco y luminoso
    gl_FragColor = vec4(col * 2.0, a);                           // emisión potenciada (incendio voraz)
  }
`;
const SMOKE_FS = `
  precision highp float;
  varying vec3 vColor; varying float vT; varying float vSeed;
  void main() {
    vec2 q = gl_PointCoord * 2.0 - 1.0;
    float r = length(q);
    if (r > 1.0) discard;
    float a = smoothstep(1.0, 0.2, r) * sin(vT * 3.1416) * 0.42; // humo más denso y amenazante
    gl_FragColor = vec4(mix(vec3(0.06,0.06,0.07), vColor * 0.16, 0.3), a);
  }
`;
// El humo reutiliza el VS del fuego, con columna más alta y grano más ancho
const SMOKE_VS = FIRE_VS
  .replace("float rise = t * (16.0 + aSev * 46.0);", "float rise = 12.0 + aSev * 30.0 + t * (60.0 + aSev * 90.0);")
  .replace("float s = (1.0 - t) * (1.0 - t) * (13.0 + aSev * 40.0) + 2.5;", "float s = (10.0 + t * 42.0) * (0.5 + aSev * 0.7);");

// ---- Glow EXPUESTOS: disco aditivo, grosor ∝ conteo ----
const FRAG_GLOW = `
  precision highp float;
  uniform float uThick;   // grosor normalizado del contorno ∝ expuestos
  varying vec2 vUv;
  void main() {
    float r = length(vUv * 2.0 - 1.0);
    if (r > 1.0) discard;
    // campo estático: banda de contorno [1−uThick, 1] + relleno tenue
    float edge = smoothstep(1.0 - uThick, 1.0 - uThick * 0.4, r) * (1.0 - smoothstep(0.92, 1.0, r));
    float fill = (1.0 - r) * 0.12;
    gl_FragColor = vec4(0.16, 0.47, 1.0, (edge * 0.8 + fill));
  }
`;

function buildLayer3D() {
  const camera = new THREE.Camera();
  const scene = new THREE.Scene();
  let renderer = null;
  const clock = new THREE.Clock();

  const uniforms = {
    uTime: { value: 0 },
    uDay: { value: CONFIG.totalDays },
    uLens: { value: new THREE.Vector3(1e9, 1e9, 0) },
    uReveal: { value: 0 },
  };

  // Edificios instanciados (un solo draw call): caja unidad con base en y=0.
  // Las dimensiones y el nº de ventanas/fuego derivan de la severidad del incidente,
  // con la misma fórmula ponderada que usaba la escena cinemática.
  {
    const n = incidents.length;
    const geo = new THREE.InstancedBufferGeometry().copy(
      new THREE.BoxGeometry(1, 1, 1).translate(0, 0.5, 0));
    geo.instanceCount = n;
    const off = new Float32Array(n * 3), col = new Float32Array(n * 3);
    const day = new Float32Array(n), dim = new Float32Array(n * 3);
    const seed = new Float32Array(n), burn = new Float32Array(n);
    incidents.forEach((inc, i) => {
      const [x, z] = mercLocal(inc.lon, inc.lat);
      off.set([x, 0, z], i * 3);
      const c = dominantColor(inc);
      col.set([c.r, c.g, c.b], i * 3);
      day[i] = inc.day;
      // Severidad ponderada (prioriza pérdidas humanas) → volumen y altura del edificio
      const sev = inc.sinSignos * 5 + inc.heridos * 3 + inc.rescatados * 2 + inc.afectados + inc.expuestos;
      const sevN = Math.min(1, sev / 12);
      const r1 = (i % 997) / 997, r2 = ((i * 7) % 991) / 991;   // jitter determinista
      const S = 1.5;                                             // escala global: mayor presencia
      const w = (8 + sevN * 13 + r1 * 4) * S;                    // huella
      const d = (8 + sevN * 13 + r2 * 4) * S;
      const h = (11 + sevN * 46) * (0.7 + 0.6 * r1) * S;         // altura ∝ severidad + variación
      dim.set([w, h, d], i * 3);
      seed[i] = r1;
      // intensidad de incendio: los edificios con víctimas arden en sus ventanas altas
      burn[i] = Math.min(1, (inc.sinSignos * 1.0 + inc.heridos * 0.6 + inc.rescatados * 0.3) / 3);
      inc._w = w; inc._h = h; inc._d = d; inc._sevN = sevN; inc._x = x; inc._z = z;
    });
    geo.setAttribute("iOffset", new THREE.InstancedBufferAttribute(off, 3));
    geo.setAttribute("iColor", new THREE.InstancedBufferAttribute(col, 3));
    geo.setAttribute("iDay", new THREE.InstancedBufferAttribute(day, 1));
    geo.setAttribute("iDim", new THREE.InstancedBufferAttribute(dim, 3));
    geo.setAttribute("iSeed", new THREE.InstancedBufferAttribute(seed, 1));
    geo.setAttribute("iBurn", new THREE.InstancedBufferAttribute(burn, 1));
    const mat = new THREE.ShaderMaterial({
      vertexShader: VERT_BUILDING, fragmentShader: FRAG_BUILDING,
      uniforms, transparent: false, depthWrite: true, side: THREE.FrontSide,
    });
    const buildings = new THREE.Mesh(geo, mat);
    buildings.frustumCulled = false;
    scene.add(buildings);
  }

  // Halos de estrato (un solo draw call instanciado)
  {
    const n = incidents.length;
    const geo = new THREE.InstancedBufferGeometry().copy(
      new THREE.PlaneGeometry(2, 2).rotateX(-Math.PI / 2));
    geo.instanceCount = n;
    const off = new Float32Array(n * 3), col = new Float32Array(n * 3);
    const day = new Float32Array(n), est = new Float32Array(n), seed = new Float32Array(n);
    incidents.forEach((inc, i) => {
      const [x, z] = mercLocal(inc.lon, inc.lat);
      off.set([x, 0, z], i * 3);
      const c = dominantColor(inc);
      col.set([c.r, c.g, c.b], i * 3);
      day[i] = inc.day; est[i] = inc.estrato; seed[i] = (i % 1000) / 1000; // desfase de titileo
    });
    geo.setAttribute("iOffset", new THREE.InstancedBufferAttribute(off, 3));
    geo.setAttribute("iColor", new THREE.InstancedBufferAttribute(col, 3));
    geo.setAttribute("iDay", new THREE.InstancedBufferAttribute(day, 1));
    geo.setAttribute("iEstrato", new THREE.InstancedBufferAttribute(est, 1));
    geo.setAttribute("iSeed", new THREE.InstancedBufferAttribute(seed, 1));
    const mat = new THREE.ShaderMaterial({
      vertexShader: VERT_HALO, fragmentShader: FRAG_HALO,
      uniforms, transparent: true, depthWrite: false,
      blending: THREE.AdditiveBlending, side: THREE.DoubleSide,
    });
    const halo = new THREE.Mesh(geo, mat);
    halo.frustumCulled = false;
    scene.add(halo);
  }

  // FX de selección: el edificio del incidente "arde" (fuego + humo) como en la
  // escena cinemática. Emisores sobre la cubierta (w×d), volumen ∝ severidad, y se
  // conserva el glow aditivo de EXPUESTOS. Se reconstruye por incidente seleccionado.
  let fireFX = null, smokeFX = null, glowMesh = null;
  const fxUniforms = { uTime: uniforms.uTime };

  function clearSelectionFX() {
    [fireFX, smokeFX].forEach(o => { if (o) { scene.remove(o); o.geometry.dispose(); o.material.dispose(); } });
    fireFX = smokeFX = null;
    if (glowMesh) { scene.remove(glowMesh); glowMesh.geometry.dispose(); glowMesh.material.dispose(); glowMesh = null; }
  }

  function spawnSelectionFX(inc) {
    clearSelectionFX();
    const [x, z] = mercLocal(inc.lon, inc.lat);
    const h = inc._h || CONFIG.baseHeight, w = inc._w || 14, d = inc._d || 14;
    const sevN = Math.max(0.25, inc._sevN || 0.2);
    const c = dominantColor(inc);
    const total = Math.floor(160 + sevN * 520);          // birth rate potenciado ∝ severidad
    const site = new Float32Array(total * 3), span = new Float32Array(total * 2);
    const col = new Float32Array(total * 3), rnd = new Float32Array(total * 3);
    const sev = new Float32Array(total);
    for (let k = 0; k < total; k++) {
      site.set([x, h, z], k * 3);                         // emisor sobre la cubierta
      span.set([w * 0.8, d * 0.8], k * 2);
      col.set([c.r, c.g, c.b], k * 3);
      rnd.set([Math.random(), Math.random(), Math.random()], k * 3);
      sev[k] = sevN;
    }
    const mk = (vs, fs, blend) => {
      const g = new THREE.BufferGeometry();
      g.setAttribute("position", new THREE.BufferAttribute(new Float32Array(total * 3), 3));
      g.setAttribute("aSite", new THREE.BufferAttribute(site, 3));
      g.setAttribute("aSpan", new THREE.BufferAttribute(span, 2));
      g.setAttribute("aColor", new THREE.BufferAttribute(col, 3));
      g.setAttribute("aRand", new THREE.BufferAttribute(rnd, 3));
      g.setAttribute("aSev", new THREE.BufferAttribute(sev, 1));
      const m = new THREE.ShaderMaterial({
        vertexShader: vs, fragmentShader: fs, uniforms: fxUniforms,
        transparent: true, depthWrite: false, blending: blend,
      });
      const pts = new THREE.Points(g, m);
      pts.frustumCulled = false;
      return pts;
    };
    smokeFX = mk(SMOKE_VS, SMOKE_FS, THREE.NormalBlending);
    fireFX = mk(FIRE_VS, FIRE_FS, THREE.AdditiveBlending);
    scene.add(smokeFX); scene.add(fireFX);
    if (inc.expuestos > 0) {
      // Grosor del contorno ∝ expuestos, acotado [0.08, 0.5]
      const thick = Math.min(0.5, 0.08 + inc.expuestos * 0.05);
      const g = new THREE.PlaneGeometry(160, 160).rotateX(-Math.PI / 2);
      const m = new THREE.ShaderMaterial({
        vertexShader: `varying vec2 vUv; void main(){ vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
        fragmentShader: FRAG_GLOW,
        uniforms: { uThick: { value: thick } },
        transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
        side: THREE.DoubleSide,
      });
      glowMesh = new THREE.Mesh(g, m);
      glowMesh.position.set(x, 1.0, z);
      scene.add(glowMesh);
    }
  }

  // ---- Picking 3D: raycast contra el volumen (AABB) de cada edificio ----
  // Selecciona el edificio bajo el cursor aunque se clique en su cuerpo o cima
  // (no solo en la base), respetando la visibilidad actual: día del timeline y
  // revelado por zoom/selección o presencia dentro de la lente de contexto.
  const _ray = new THREE.Ray();
  const _box = new THREE.Box3();
  const _hit = new THREE.Vector3();
  const _invProj = new THREE.Matrix4();
  function pick(ndcX, ndcY) {
    _invProj.copy(camera.projectionMatrix).invert();
    const near = new THREE.Vector3(ndcX, ndcY, -1).applyMatrix4(_invProj);
    const far  = new THREE.Vector3(ndcX, ndcY,  1).applyMatrix4(_invProj);
    _ray.origin.copy(near);
    _ray.direction.copy(far.sub(near)).normalize();
    const uDay = uniforms.uDay.value;
    const lx = uniforms.uLens.value.x, lz = uniforms.uLens.value.y, lr = uniforms.uLens.value.z;
    const revealed = uniforms.uReveal.value >= 0.5;
    let best = -1, bestT = Infinity;
    for (let i = 0; i < incidents.length; i++) {
      const inc = incidents[i];
      if (inc.day > uDay) continue;                         // futuro ⇒ no seleccionable
      if (!revealed) {                                      // en macro solo lo visible bajo la lente
        const dx = inc._x - lx, dz = inc._z - lz;
        if (dx * dx + dz * dz > lr * lr) continue;
      }
      const hw = inc._w * 0.5, hd = inc._d * 0.5;
      _box.min.set(inc._x - hw, 0, inc._z - hd);
      _box.max.set(inc._x + hw, inc._h, inc._z + hd);
      if (_ray.intersectBox(_box, _hit)) {
        const t = _hit.distanceToSquared(_ray.origin);      // hit más cercano a la cámara
        if (t < bestT) { bestT = t; best = i; }
      }
    }
    return best;
  }

  return {
    id: "incidents-3d",
    type: "custom",
    renderingMode: "3d",
    uniforms, spawnSelectionFX, clearSelectionFX, pick,
    onAdd(mapInst, gl) {
      renderer = new THREE.WebGLRenderer({ canvas: mapInst.getCanvas(), context: gl, antialias: true });
      renderer.autoClear = false;
    },
    render(gl, matrix) {
      uniforms.uTime.value = clock.getElapsedTime();
      // matriz: proyección MapLibre → traslación/escala del origen Mercator
      const m = new THREE.Matrix4().fromArray(matrix);
      const l = new THREE.Matrix4()
        .makeTranslation(ORIGIN.x, ORIGIN.y, 0)
        .scale(new THREE.Vector3(METER, -METER, METER))
        .multiply(new THREE.Matrix4().makeRotationX(Math.PI / 2));
      camera.projectionMatrix = m.multiply(l);
      renderer.resetState();
      renderer.render(scene, camera);
      map.triggerRepaint();
    },
  };
}

/* ---------------------------------------------------------------
   4. INTERACCIÓN: LENTE (hover), SELECCIÓN (click), TIMELINE
   --------------------------------------------------------------- */
const tooltip = document.getElementById("tooltip");
const phaseEl = document.getElementById("phase-indicator");
const fmtDate = d => new Date(CONFIG.epoch + d * 86400000)
  .toLocaleDateString("es-CO", { day: "numeric", month: "long", year: "numeric", timeZone: "UTC" });

function setPhase(txt) { phaseEl.textContent = txt; }

// Píxel del evento (CSS px del contenedor) → coordenadas NDC [-1, 1] para el raycast
function ndc(point) {
  const cv = map.getCanvas();
  return [(point.x / cv.clientWidth) * 2 - 1, -((point.y / cv.clientHeight) * 2 - 1)];
}

map.on("mousemove", e => {
  if (!layer3D) return;
  // Lente: radio en px → metros según resolución actual del mapa
  // metros/px = 156543.03 · cos(lat) / 2^zoom  (resolución Web Mercator)
  const mpp = 156543.03392 * Math.cos(e.lngLat.lat * Math.PI / 180) / Math.pow(2, map.getZoom());
  const [x, z] = mercLocal(e.lngLat.lng, e.lngLat.lat);
  layer3D.uniforms.uLens.value.set(x, z, CONFIG.lensRadiusPx * mpp);

  // edificio bajo el cursor por raycast (la lente ya se actualizó arriba)
  const [nx, ny] = ndc(e.point);
  const i = layer3D.pick(nx, ny);
  if (i >= 0) {
    const inc = incidents[i];
    tooltip.innerHTML =
      `<div class="tt-title">${inc.servicio}</div>` +
      `<div class="tt-sub">${inc.barrio} · ESTRATO ${inc.estrato}</div>` +
      `<div class="tt-sub">${inc.fechaTxt}</div>`;
    tooltip.style.left = (e.point.x + 16) + "px";
    tooltip.style.top = (e.point.y - 10) + "px";
    tooltip.classList.add("visible");
    map.getCanvas().style.cursor = "pointer";
    if (selected < 0) setPhase("FASE 2 · LENTE DE CONTEXTO");
  } else {
    tooltip.classList.remove("visible");
    map.getCanvas().style.cursor = "";
    if (selected < 0) setPhase(map.getZoom() > CONFIG.reveal3DZoom ? "VISTA 3D" : "FASE 1 · VISTA MACRO");
  }
});

map.on("click", e => {
  // sincroniza la lente con el punto de clic (gate del picking en vista macro)
  const mpp = 156543.03392 * Math.cos(e.lngLat.lat * Math.PI / 180) / Math.pow(2, map.getZoom());
  const [lcx, lcz] = mercLocal(e.lngLat.lng, e.lngLat.lat);
  layer3D.uniforms.uLens.value.set(lcx, lcz, CONFIG.lensRadiusPx * mpp);
  const [nx, ny] = ndc(e.point);
  const i = layer3D.pick(nx, ny);
  if (i < 0) { closeDetail(); return; }
  selected = i;
  const inc = incidents[i];
  layer3D.spawnSelectionFX(inc);          // el edificio seleccionado arde (fuego + humo)
  setPhase("FASE 3 · MICRO-ANÁLISIS");
  // Interpolación de cámara (paneo + zoom + rotación) a vista micro-isométrica.
  // essential:true ⇒ la animación corre aun con "prefers-reduced-motion" activo
  // (de lo contrario MapLibre salta al destino sin transición).
  // offset desplaza el encuadre a la izquierda para no ocultar el edificio tras la tarjeta.
  map.flyTo({
    center: [inc.lon, inc.lat], zoom: 17.2, pitch: 62, bearing: -28,
    duration: 2200, essential: true, offset: [-190, 20],
    easing: t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2, // cubic in-out
  });
  // Tarjeta de datos a la derecha
  document.getElementById("dp-title").textContent = inc.servicio;
  document.getElementById("dp-date").textContent = `${inc.fechaTxt} · ${inc.hora}`;
  document.getElementById("dp-loc").textContent = `${inc.barrio} — UPZ ${inc.upz}, ${inc.localidad} (Estrato ${inc.estrato})`;
  document.getElementById("dp-serv").textContent = `${inc.clase || "—"} · Causa: ${inc.causa}`;
  document.getElementById("dp-resp").textContent = `Estación ${inc.estacion} · T. respuesta ${inc.tresp} · Servicio Nº ${inc.num}`;
  const M = [
    ["SIN SIGNOS", inc.sinSignos, "var(--c-sinsignos)"],
    ["HERIDOS", inc.heridos, "var(--c-heridos)"],
    ["RESCATADOS", inc.rescatados, "var(--c-rescatados)"],
    ["AFECTADOS", inc.afectados, "var(--c-afectados)"],
    ["EXPUESTOS", inc.expuestos, "var(--c-expuestos)"],
  ];
  document.getElementById("dp-metrics").innerHTML = M.map(([n, v, cc]) =>
    `<div class="dp-metric"><span class="dot" style="background:${cc};opacity:${v > 0 ? 1 : 0.18}"></span>` +
    `<span class="name" style="opacity:${v > 0 ? 1 : 0.35}">${n}</span>` +
    `<span class="count" style="opacity:${v > 0 ? 1 : 0.25}">${v}</span></div>`).join("");
  openPanel();   // muelle físico: montaje del panel con desaceleración natural
});

function closeDetail() {
  if (selected < 0) return;
  selected = -1;
  closePanel();   // muelle físico: desmontaje del panel
  layer3D.clearSelectionFX();
  // Reversión suave a la perspectiva macro (essential:true por reduced-motion)
  map.flyTo({
    center: CONFIG.center, zoom: 12.5, pitch: 30, bearing: 0,
    duration: 1600, essential: true,
    easing: t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2,
  });
  setPhase("FASE 1 · VISTA MACRO");
}
document.getElementById("close-panel").addEventListener("click", closeDetail);
document.addEventListener("keydown", e => { if (e.key === "Escape") closeDetail(); });

// Transición de revelado 3D por zoom: uReveal interpola en [z-1, z+0.5]
map.on("move", () => {
  if (!layer3D) return;
  const z = map.getZoom();
  const r = Math.min(1, Math.max(0, (z - (CONFIG.reveal3DZoom - 1)) / 1.5));
  layer3D.uniforms.uReveal.value = selected >= 0 ? 1 : r;
});

// ---- Timeline ----
// El slider se subdivide en CONFIG.timeScale pasos por día (rango numérico mayor):
// el periodo se despliega más largo y los incidentes quedan más separados en el tiempo.
const slider = document.getElementById("time-slider");
const readout = document.getElementById("date-readout");
const SLIDER_MAX = CONFIG.totalDays * CONFIG.timeScale;
slider.max = SLIDER_MAX;
slider.value = SLIDER_MAX;                  // arranca mostrando el final del periodo
function applyDay() {
  const d = (+slider.value) / CONFIG.timeScale;   // valor del slider → día real
  if (layer3D) layer3D.uniforms.uDay.value = d;
  readout.textContent = fmtDate(d);
  slider.style.setProperty("--fill", (+slider.value / SLIDER_MAX * 100) + "%");
  if (map.getLayer("heat")) map.setFilter("heat", ["<=", ["get", "day"], d]);
}
slider.addEventListener("input", applyDay);

let playTimer = null;
document.getElementById("play-btn").addEventListener("click", function () {
  if (playTimer) { clearInterval(playTimer); playTimer = null; this.textContent = "▶"; return; }
  if (+slider.value >= SLIDER_MAX) slider.value = 0;
  this.textContent = "❚❚";
  playTimer = setInterval(() => {
    slider.value = +slider.value + 1;
    applyDay();
    if (+slider.value >= SLIDER_MAX) { clearInterval(playTimer); playTimer = null; document.getElementById("play-btn").textContent = "▶"; }
  }, 35);
});

/* ---------------------------------------------------------------
   4b. CINEMÁTICA: motion-blur por velocidad de cámara + muelles UI
   --------------------------------------------------------------- */
// ---- MOTION BLUR dirigido por la velocidad de cámara ----
// MapLibre posee el framebuffer y compone el basemap; Three.js sólo dibuja los
// edificios dentro de ese contexto. Un EffectComposer desenfocaría SÓLO la
// geometría WebGL (no el mapa) y rompería la composición, además de gastar pases
// de pantalla completa. Ruta elegida (la más ligera y coherente): un filtro SVG
// anisótropo sobre el canvas COMPLETO, alimentado por la velocidad de cámara en
// espacio-pantalla. En reposo se desconecta (filter:none ⇒ coste cero); sólo se
// engancha en paneos/zoom/flyTo rápidos. El blur es direccional: stdDeviation por
// eje ∝ |velocidad_x|, |velocidad_y| (paneo) + término isótropo (zoom/rot/pitch).
const mblurGauss = document.getElementById("mblur-gauss");
let prevCenter = null, prevZoom = null, prevBearing = null, prevPitch = null;
let blurX = 0, blurY = 0, blurOn = false;

// Curva de respuesta VELOCIDAD→DESENFOQUE (px/frame → stdDeviation en px).
// Antes el mapeo era lineal 1:1 (stdDeviation = velocidad), de modo que un
// paneo lento de 2-3 px/frame ya producía un gaussiano de 2-3 px que arruinaba
// la legibilidad. Se sustituye por «zona muerta + curva potencia»:
//   · Por debajo de V0 el blur es exactamente 0  ⇒ paneos lentos e inercia
//     residual quedan nítidos y el filtro se desengancha (coste GPU 0).
//   · Entre V0 y V1 la magnitud crece como t^GAMMA (GAMMA>1): el exponente
//     comprime el tramo bajo-medio y sólo deja florecer el blur cerca de V1.
//   · En V1 (flings de inercia y flyTo) se alcanza el desenfoque máximo MAX.
// Se descartó smoothstep porque su pendiente es MÁXIMA en el punto medio —
// justo el rango que queremos mantener en calma. El coste del feGaussianBlur
// crece con el radio del kernel (∝ std), así que rebajar la magnitud media es
// además un ahorro neto de GPU, no sólo una mejora de legibilidad.
const BLUR = {
  V0: 2.2,    // px/frame — umbral de activación (zona muerta): por debajo, nitidez total
  V1: 15,     // px/frame — velocidad de saturación: aquí se alcanza el blur máximo
  GAMMA: 2.4, // >1 ⇒ comprime el rango bajo-medio, reserva la distorsión para lo rápido
  MAX: 7,     // stdDeviation máximo (px) en saturación
  OFF: 0.4,   // por debajo de este stdDeviation se desengancha el filtro (coste 0)
};
function velocityToBlur(v) {
  const t = (v - BLUR.V0) / (BLUR.V1 - BLUR.V0);   // normaliza a la ventana de activación
  if (t <= 0) return 0;                            // zona muerta: sin desenfoque
  return BLUR.MAX * Math.pow(t < 1 ? t : 1, BLUR.GAMMA);
}

{   // El motion-blur acompaña al flyTo (essential:true): por coherencia, siempre activo.
  map.on("render", () => {
    const c = map.getCenter();
    let px = 0, py = 0;
    if (prevCenter) {
      const sp = map.project(prevCenter);     // dónde cae el centro anterior ahora
      const sc = map.project(c);              // centro actual (≈ centro de pantalla)
      px = sp.x - sc.x; py = sp.y - sc.y;      // desplazamiento de paneo en píxeles/frame
    }
    prevCenter = c;
    const z = map.getZoom(), b = map.getBearing(), pit = map.getPitch();
    const dz = prevZoom    != null ? Math.abs(z - prevZoom)     : 0;
    const db = prevBearing != null ? Math.abs(b - prevBearing)  : 0;
    const dp = prevPitch   != null ? Math.abs(pit - prevPitch)  : 0;
    prevZoom = z; prevBearing = b; prevPitch = pit;

    // zoom/rotación/pitch no mueven el punto central ⇒ término isótropo adicional
    const iso = dz * 26 + db * 0.7 + dp * 0.55;
    // velocidad de cámara por eje → magnitud de blur a través de la curva no lineal
    const tx = velocityToBlur(Math.abs(px) + iso);
    const ty = velocityToBlur(Math.abs(py) + iso);

    // subida inmediata al objetivo, caída exponencial (0.80/frame) al detenerse.
    // velocityToBlur ya acota a [0, MAX] ⇒ el arrastre decae pero nunca lo supera.
    blurX = Math.max(tx, blurX * 0.80);
    blurY = Math.max(ty, blurY * 0.80);

    if (blurX < BLUR.OFF && blurY < BLUR.OFF) {
      if (blurOn) { map.getCanvas().style.filter = ""; blurOn = false; }
    } else {
      mblurGauss.setAttribute("stdDeviation", blurX.toFixed(2) + " " + blurY.toFixed(2));
      if (!blurOn) { map.getCanvas().style.filter = "url(#mblur)"; blurOn = true; }
    }
  });
}

// ---- Muelle físico para el panel de datos (masa·tensión·fricción) ----
// Sustituye la transición CSS por la integración de un resorte: aceleración
// = (−k·x − d·v)/m. Levemente subamortiguado ⇒ desaceleración natural con un
// micro-sobreimpulso "premium". Sólo corre en rAF mientras hay movimiento.
const panelEl = document.getElementById("detail-panel");
const spring = {
  value: 0, target: 0, v: 0, raf: 0, m: 1,
  k: 205,    // tensión
  d: 24,     // fricción (crítico≈2√k≈28.6 ⇒ 24 = leve rebote "premium")
};
function applyPanel(v) {
  panelEl.style.transform = `translateX(${(1 - v) * 100}%) scale(${0.985 + 0.015 * v})`;
  panelEl.style.opacity = Math.max(0, Math.min(1, v * 1.4));
  panelEl.style.pointerEvents = v > 0.02 ? "auto" : "none";
}
function springStep() {
  const dt = 1 / 60;
  const a = (-spring.k * (spring.value - spring.target) - spring.d * spring.v) / spring.m;
  spring.v += a * dt;
  spring.value += spring.v * dt;
  if (Math.abs(spring.v) < 0.0015 && Math.abs(spring.value - spring.target) < 0.0015) {
    spring.value = spring.target; spring.v = 0; applyPanel(spring.value); spring.raf = 0; return;
  }
  applyPanel(spring.value);
  spring.raf = requestAnimationFrame(springStep);
}
function openPanel()  { spring.target = 1; if (!spring.raf) spring.raf = requestAnimationFrame(springStep); }
function closePanel() { spring.target = 0; if (!spring.raf) spring.raf = requestAnimationFrame(springStep); }
applyPanel(0);   // estado inicial coherente (panel cerrado)

/* ---------------------------------------------------------------
   4c. INERCIA DE PANEO EXPLÍCITA (momentum scroll 3D)
   La inercia nativa de dragPan no daba glide fiable aquí, así que la integramos
   nosotros sobre la MISMA cámara de MapLibre (no un control de Three). Durante el
   arrastre muestreamos la trayectoria del CENTRO que produce el dragPan nativo;
   al soltar la continuamos por frame con setCenter y decaimiento exponencial.
   · A prueba de signos: continúa el movimiento real del centro (no reinterpreta
     direcciones de cursor ni convenciones de panBy).
   · Independiente del zoom: umbrales y tope relativos al ancho del viewport.
   · Alimenta el motion-blur gratis: cada setCenter mueve el centro ⇒ el handler
     de render lee la velocidad y la curva no lineal decide el desenfoque.
   --------------------------------------------------------------- */
{
  const F = 0.92;        // fricción por frame (↑ = glide más largo)
  const SMOOTH = 0.55;   // suavizado exponencial de la velocidad de arrastre
  const START_PX = 2;    // px/frame al soltar por debajo de los cuales NO hay glide
  const MAX_PX = 50;     // tope de velocidad de soltado (px/frame): evita flings desbocados
  const STOP_PX = 0.3;   // px/frame por debajo de los cuales el glide se detiene
  const SAMPLE_MS = 90;  // pausa antes de soltar ⇒ sin impulso (inercia "real")

  let active = false, prevC = null, prevT = 0, lastMoveT = 0;
  let dLng = 0, dLat = 0, raf = 0;
  const cancel = () => { if (raf) { cancelAnimationFrame(raf); raf = 0; } };

  map.on("dragstart", () => {
    cancel(); active = true; dLng = dLat = 0;
    prevC = map.getCenter(); prevT = lastMoveT = performance.now();
  });
  map.on("drag", () => {
    if (!active || !prevC) return;
    const c = map.getCenter(), now = performance.now();
    const k = 16.7 / Math.max(1, now - prevT);          // normaliza a Δ por frame (~60fps)
    dLng = dLng * (1 - SMOOTH) + (c.lng - prevC.lng) * k * SMOOTH;
    dLat = dLat * (1 - SMOOTH) + (c.lat - prevC.lat) * k * SMOOTH;
    prevC = c; prevT = lastMoveT = now;
  });
  map.on("dragend", () => {
    if (!active) return;
    active = false;
    if (performance.now() - lastMoveT > SAMPLE_MS) return;   // se detuvo antes de soltar
    if (Math.hypot(dLng, dLat) < 1e-9) return;
    // velocidad de soltado convertida a PÍXELES/frame (correcta a cualquier zoom/pitch):
    // proyecta el centro y el centro+Δ y mide su separación en pantalla.
    const c = map.getCenter();
    const p0 = map.project(c);
    const p1 = map.project([c.lng + dLng, c.lat + dLat]);
    let px = Math.hypot(p1.x - p0.x, p1.y - p0.y);
    if (px < START_PX) return;                                // arrastre lento ⇒ sin glide
    if (px > MAX_PX) { const s = MAX_PX / px; dLng *= s; dLat *= s; px = MAX_PX; }
    const stopDeg = Math.hypot(dLng, dLat) * (STOP_PX / px);  // umbral de parada (en grados, ∝ px)
    map.stop();                                               // anula cualquier ease residual
    const step = () => {
      const cc = map.getCenter();
      map.setCenter([cc.lng + dLng, cc.lat + dLat]);          // continúa la trayectoria del centro
      dLng *= F; dLat *= F;
      if (Math.hypot(dLng, dLat) > stopDeg) raf = requestAnimationFrame(step);
      else raf = 0;
    };
    raf = requestAnimationFrame(step);
  });
  // Re-agarre, clic de selección o zoom de rueda ⇒ cortar el glide en curso
  const cont = map.getCanvasContainer();
  cont.addEventListener("pointerdown", cancel);
  cont.addEventListener("wheel", cancel, { passive: true });
}

/* ---------------------------------------------------------------
   5. ARRANQUE
   --------------------------------------------------------------- */
Promise.all([loadData(), new Promise(r => map.on("load", r))]).then(([data]) => {
  incidents = data;

  // Heatmap macro (Fase 1): puntos de calor abstractos, carmesí sobre B/N
  map.addSource("pts", {
    type: "geojson",
    data: {
      type: "FeatureCollection",
      features: incidents.map(d => ({
        type: "Feature",
        geometry: { type: "Point", coordinates: [d.lon, d.lat] },
        properties: { day: d.day },
      })),
    },
  });
  map.addLayer({
    id: "heat", type: "heatmap", source: "pts",
    paint: {
      "heatmap-radius": ["interpolate", ["linear"], ["zoom"], 9, 4, 14, 18],
      "heatmap-intensity": ["interpolate", ["linear"], ["zoom"], 9, 0.06, 14, 0.3],
      "heatmap-weight": 0.5,
      "heatmap-color": ["interpolate", ["linear"], ["heatmap-density"],
        0, "rgba(0,0,0,0)",
        0.25, "rgba(80,8,20,0.45)",
        0.55, "rgba(179,18,46,0.75)",
        0.85, "rgba(255,106,0,0.85)",
        1, "rgba(255,224,0,0.95)"],
      // El heatmap se desvanece al entrar en rango 3D
      "heatmap-opacity": ["interpolate", ["linear"], ["zoom"], 13, 0.85, CONFIG.reveal3DZoom, 0],
    },
  });

  layer3D = buildLayer3D();
  map.addLayer(layer3D);
  applyDay();

  document.getElementById("legend").classList.add("visible");
  const loader = document.getElementById("loader");
  loader.style.opacity = "0";
  setTimeout(() => loader.remove(), 800);
});
</script>
